<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduGestor IA - Aula Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #ffffff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 12px 20px; border-radius: 8px; z-index: 9999; opacity: 0; transition: opacity 0.3s; }
        .toast.show { opacity: 1; }
        body.dark { background-color: #1e1e2f; color: #e0e0e0; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors">

<!-- Toast container -->
<div id="toast" class="toast"></div>

<!-- Pantalla de bienvenida -->
<div id="welcomeScreen" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white dark:bg-gray-800 rounded-2xl p-8 max-w-md w-full shadow-xl text-center">
        <i class="fas fa-brain text-5xl text-blue-600 mb-4"></i>
        <h1 class="text-3xl font-bold text-gray-800 dark:text-white">EduGestor IA</h1>
        <p class="text-gray-500 dark:text-gray-400 mb-6">Plataforma educativa con IA</p>
        <button id="teacherBtn" class="w-full bg-indigo-600 text-white py-3 rounded-xl mb-3 hover:bg-indigo-700 transition">Acceso Docente</button>
        <button id="studentBtn" class="w-full bg-emerald-600 text-white py-3 rounded-xl hover:bg-emerald-700 transition">Acceso Estudiante</button>
    </div>
</div>

<!-- Modal docente -->
<div id="teacherModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 w-96">
        <h2 class="text-xl font-bold mb-4">Acceso Docente</h2>
        <input type="password" id="teacherPass" placeholder="Contraseña" class="w-full border p-2 rounded mb-4 dark:bg-gray-700">
        <button id="loginTeacher" class="bg-indigo-600 text-white w-full py-2 rounded">Ingresar</button>
        <button id="closeTeacherModal" class="text-gray-500 mt-2 w-full">Cancelar</button>
    </div>
</div>

<!-- Modal estudiante (selección de grado y nombre) -->
<div id="studentModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 w-96">
        <h2 class="text-xl font-bold mb-4">Selecciona tu grado</h2>
        <select id="studentGradeSelect" class="w-full border p-2 rounded mb-3 dark:bg-gray-700"></select>
        <select id="studentNameSelect" class="w-full border p-2 rounded mb-4 dark:bg-gray-700"></select>
        <button id="enterStudent" class="bg-emerald-600 text-white w-full py-2 rounded">Entrar</button>
        <button id="closeStudentModal" class="text-gray-500 mt-2 w-full">Cancelar</button>
    </div>
</div>

<!-- Panel Docente -->
<div id="teacherPanel" class="hidden min-h-screen bg-gray-100 dark:bg-gray-900">
    <nav class="bg-indigo-700 text-white p-4 flex justify-between">
        <h2 class="text-xl font-bold">Panel Docente</h2>
        <button id="logoutTeacherPanel" class="bg-red-500 px-3 py-1 rounded">Salir</button>
    </nav>
    <div class="p-6">
        <div class="flex gap-2 border-b mb-4">
            <button class="tab-btn active bg-indigo-600 text-white px-4 py-2 rounded-t" data-tab="tasksTab">Tareas</button>
            <button class="tab-btn bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded-t" data-tab="examsTab">Exámenes</button>
            <button class="tab-btn bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded-t" data-tab="gradesTab">Calificaciones</button>
            <button class="tab-btn bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded-t" data-tab="studentsTab">Estudiantes</button>
        </div>

        <!-- Tareas -->
        <div id="tasksTab" class="tab-content">
            <div class="bg-white dark:bg-gray-800 p-4 rounded shadow mb-4">
                <h3 class="font-bold mb-2">Nueva Tarea</h3>
                <input type="text" id="taskTitle" placeholder="Título" class="w-full border p-2 rounded mb-2 dark:bg-gray-700">
                <select id="taskGrade" class="w-full border p-2 rounded mb-2 dark:bg-gray-700"></select>
                <select id="taskArea" class="w-full border p-2 rounded mb-2 dark:bg-gray-700"></select>
                <textarea id="taskDesc" placeholder="Descripción" class="w-full border p-2 rounded mb-2 dark:bg-gray-700" rows="2"></textarea>
                <input type="file" id="taskFileInput" accept=".pdf,.doc,.docx,.txt" class="mb-2">
                <input type="text" id="taskLink" placeholder="Enlace (YouTube, etc.)" class="w-full border p-2 rounded mb-2 dark:bg-gray-700">
                <button id="publishTask" class="bg-indigo-600 text-white px-4 py-2 rounded">Publicar Tarea</button>
            </div>
            <div id="tasksList" class="grid gap-4"></div>
        </div>

        <!-- Exámenes -->
        <div id="examsTab" class="tab-content hidden">
            <div class="bg-white dark:bg-gray-800 p-4 rounded shadow mb-4">
                <h3 class="font-bold mb-2">Crear Examen</h3>
                <input type="text" id="examTitle" placeholder="Título" class="w-full border p-2 rounded mb-2 dark:bg-gray-700">
                <select id="examGrade" class="w-full border p-2 rounded mb-2 dark:bg-gray-700"></select>
                <select id="examArea" class="w-full border p-2 rounded mb-2 dark:bg-gray-700"></select>
                <textarea id="examTopic" placeholder="Tema para generar preguntas con IA" class="w-full border p-2 rounded mb-2 dark:bg-gray-700" rows="2"></textarea>
                <div class="flex gap-2 mb-2">
                    <input type="number" id="numQuestions" placeholder="Nº preguntas" class="border p-2 rounded w-24 dark:bg-gray-700" value="5">
                    <button id="generateQuestions" class="bg-purple-600 text-white px-3 py-2 rounded">Generar con IA</button>
                </div>
                <div id="questionsEditor" class="border p-2 rounded mb-2"></div>
                <button id="publishExam" class="bg-emerald-600 text-white px-4 py-2 rounded">Publicar Examen</button>
            </div>
            <div id="examsList" class="grid gap-4"></div>
        </div>

        <!-- Calificaciones (docente) -->
        <div id="gradesTab" class="tab-content hidden">
            <div class="flex gap-2 mb-4">
                <select id="filterGrade" class="border p-2 rounded dark:bg-gray-700"></select>
                <select id="filterArea" class="border p-2 rounded dark:bg-gray-700"></select>
                <button id="refreshGrades" class="bg-gray-500 text-white px-3 py-1 rounded">Refrescar</button>
            </div>
            <div id="gradesTable" class="overflow-x-auto">
                <table class="w-full border-collapse bg-white dark:bg-gray-800">
                    <thead><tr class="bg-gray-200 dark:bg-gray-700"><th>Estudiante</th><th>Examen</th><th>Nota</th><th>Acciones</th><th>Fecha</th></tr></thead>
                    <tbody id="gradesTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Estudiantes -->
        <div id="studentsTab" class="tab-content hidden">
            <div class="bg-white dark:bg-gray-800 p-4 rounded shadow">
                <h3 class="font-bold mb-2">Agregar Estudiante</h3>
                <input type="text" id="newStudentName" placeholder="Nombre completo" class="w-full border p-2 rounded mb-2 dark:bg-gray-700">
                <select id="newStudentGrade" class="w-full border p-2 rounded mb-2 dark:bg-gray-700"></select>
                <input type="text" id="newStudentPhone" placeholder="Teléfono" class="w-full border p-2 rounded mb-2 dark:bg-gray-700">
                <button id="addStudent" class="bg-emerald-600 text-white px-4 py-2 rounded">Guardar</button>
                <hr class="my-4">
                <select id="filterStudentsGrade" class="w-full border p-2 rounded mb-2 dark:bg-gray-700"></select>
                <div id="studentsList" class="grid gap-2"></div>
            </div>
        </div>
    </div>
</div>

<!-- Panel Estudiante -->
<div id="studentPanel" class="hidden min-h-screen bg-gray-100 dark:bg-gray-900">
    <nav class="bg-emerald-700 text-white p-4 flex justify-between">
        <div><span id="studentNameSpan" class="font-bold"></span> - <span id="studentGradeSpan"></span></div>
        <button id="logoutStudentPanel" class="bg-red-500 px-3 py-1 rounded">Salir</button>
    </nav>
    <div class="p-6">
        <div class="flex gap-2 border-b mb-4">
            <button class="student-tab-btn active bg-emerald-600 text-white px-4 py-2 rounded-t" data-stab="studentTasksTab">Mis Tareas</button>
            <button class="student-tab-btn bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded-t" data-stab="studentExamsTab">Evaluaciones</button>
            <button class="student-tab-btn bg-gray-200 dark:bg-gray-700 px-4 py-2 rounded-t" data-stab="studentGradesTab">Calificaciones</button>
        </div>
        <div id="studentTasksTab" class="student-tab-content">
            <div id="studentTasksList" class="grid gap-4"></div>
        </div>
        <div id="studentExamsTab" class="student-tab-content hidden">
            <div id="studentExamsList" class="grid gap-4"></div>
        </div>
        <div id="studentGradesTab" class="student-tab-content hidden">
            <div id="studentGradesList" class="grid gap-4"></div>
        </div>
    </div>
</div>

<!-- Modal para tomar examen -->
<div id="examTakeModal" class="fixed inset-0 bg-black bg-opacity-80 hidden items-center justify-center z-50 p-4 overflow-auto">
    <div class="bg-white dark:bg-gray-800 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-auto p-4">
        <h2 id="examTakeTitle" class="text-xl font-bold mb-4">Examen</h2>
        <div id="examTakeQuestions"></div>
        <div class="flex justify-end gap-2 mt-4">
            <button id="cancelExam" class="bg-gray-400 px-4 py-2 rounded">Cancelar</button>
            <button id="submitExamBtn" class="bg-emerald-600 text-white px-4 py-2 rounded">Enviar</button>
        </div>
    </div>
</div>

<!-- Modal para ver respuestas del estudiante -->
<div id="viewAnswersModal" class="fixed inset-0 bg-black bg-opacity-80 hidden items-center justify-center z-50 p-4 overflow-auto">
    <div class="bg-white dark:bg-gray-800 rounded-xl max-w-2xl w-full max-h-[90vh] overflow-auto p-4">
        <h2 id="viewAnswersTitle" class="text-xl font-bold mb-4">Respuestas del examen</h2>
        <div id="viewAnswersContent"></div>
        <button id="closeAnswersModal" class="bg-gray-500 text-white px-4 py-2 rounded mt-4">Cerrar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, onSnapshot, serverTimestamp, getDoc, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

    // ---------- Firebase Config ----------
    const firebaseConfig = {
        apiKey: "AIzaSyClWwYzro_avn1pK0DvD4x1r4v1grSAoE0",
        authDomain: "registro-jn-andrews-mpc.firebaseapp.com",
        projectId: "registro-jn-andrews-mpc",
        storageBucket: "registro-jn-andrews-mpc.firebasestorage.app",
        messagingSenderId: "701752375464",
        appId: "1:701752375464:web:eaab256668b869d026aa9d"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    const DEEPSEEK_API_KEY = "sk-70c41d62b6114a6d85b700e27a3c7534";

    // Referencias
    const studentsRef = collection(db, 'students');
    const tasksRef = collection(db, 'tasks');
    const examsRef = collection(db, 'exams');
    const submissionsRef = collection(db, 'submissions');
    const resultsRef = collection(db, 'examResults');

    let currentUser = null;
    let currentStudent = null;
    let allStudents = [];
    let allTasks = [];
    let allExams = [];
    let allSubmissions = [];
    let allResults = [];

    // Helper: toast
    function showToast(msg, type='info') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Helper: cargar selects de grados
    const allGrades = ["PRIMERO DE PRIMARIA","SEGUNDO DE PRIMARIA","TERCERO DE PRIMARIA","CUARTO DE PRIMARIA","QUINTO DE PRIMARIA","SEXTO DE PRIMARIA","PRIMERO DE SECUNDARIA","SEGUNDO DE SECUNDARIA","TERCERO DE SECUNDARIA","CUARTO DE SECUNDARIA","QUINTO DE SECUNDARIA"];
    const allAreas = ["Matemáticas","Comunicación","Ciencias Sociales","Ciencia y Tecnología","Personal Social","Inglés","Arte y Cultura","Educación Física","Computación","Educación Religiosa","Tutoría","EPT"];

    function populateGradeSelects() {
        const selects = ['taskGrade', 'examGrade', 'newStudentGrade', 'filterStudentsGrade', 'filterGrade', 'studentGradeSelect'];
        selects.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.innerHTML = '<option value="">-- Seleccionar --</option>' + allGrades.map(g => `<option value="${g}">${g}</option>`).join('');
        });
        const areaSelects = ['taskArea', 'examArea', 'filterArea'];
        areaSelects.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.innerHTML = '<option value="">-- Seleccionar --</option>' + allAreas.map(a => `<option value="${a}">${a}</option>`).join('');
        });
    }

    // Autenticación anónima
    signInAnonymously(auth).catch(e => console.error(e));
    onAuthStateChanged(auth, user => { currentUser = user; if (user) seedInitialStudents(); });

    // Datos iniciales de estudiantes (solo ejemplo, puedes agregar más)
    const initialStudents = [
        { name: "LLANQUE ALMIRON Yader Jocsan", grade: "QUINTO DE SECUNDARIA", phones: ["958005914"] },
        { name: "BATALLANOS SACSI Flor de Liz", grade: "PRIMERO DE PRIMARIA", phones: ["918274035"] }
    ];

    async function seedInitialStudents() {
        const snap = await getDocs(studentsRef);
        if (snap.empty) {
            for (const s of initialStudents) await addDoc(studentsRef, s);
            showToast("Directorio cargado", "success");
        }
    }

    // Cargar datos en tiempo real
    function loadData() {
        onSnapshot(studentsRef, snap => { allStudents = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderStudentsList(); renderGradesTable(); });
        onSnapshot(tasksRef, snap => { allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderTasksList(); });
        onSnapshot(examsRef, snap => { allExams = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderExamsList(); });
        onSnapshot(submissionsRef, snap => { allSubmissions = snap.docs.map(d => ({ id: d.id, ...d.data() })); });
        onSnapshot(resultsRef, snap => { allResults = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderGradesTable(); renderStudentGrades(); });
    }

    // ========== DOCENTE ==========
    function renderTasksList() {
        const container = document.getElementById('tasksList');
        if (!container) return;
        const gradeFilter = document.getElementById('filterTasksGrade')?.value || '';
        const areaFilter = document.getElementById('filterTasksArea')?.value || '';
        let filtered = allTasks.filter(t => (!gradeFilter || t.grade === gradeFilter) && (!areaFilter || t.area === areaFilter));
        container.innerHTML = filtered.map(t => `
            <div class="bg-white dark:bg-gray-800 p-3 rounded shadow">
                <div class="font-bold">${escapeHtml(t.title)}</div>
                <div>${t.area} - ${t.grade}</div>
                <p class="text-sm">${escapeHtml(t.description)}</p>
                ${t.fileURL ? `<a href="${t.fileURL}" target="_blank" class="text-blue-500 text-sm">📎 Archivo adjunto</a>` : ''}
                ${t.link ? `<a href="${t.link}" target="_blank" class="text-blue-500 text-sm ml-2">🔗 Enlace</a>` : ''}
                <button class="delete-task bg-red-500 text-white px-2 py-1 rounded text-sm mt-2" data-id="${t.id}">Eliminar</button>
            </div>
        `).join('');
        document.querySelectorAll('.delete-task').forEach(btn => btn.onclick = async () => { await deleteDoc(doc(tasksRef, btn.dataset.id)); showToast("Tarea eliminada"); });
    }

    function renderExamsList() {
        const container = document.getElementById('examsList');
        if (!container) return;
        container.innerHTML = allExams.map(e => `
            <div class="bg-white dark:bg-gray-800 p-3 rounded shadow">
                <div class="font-bold">${escapeHtml(e.title)}</div>
                <div>${e.area} - ${e.grade}</div>
                <div>${e.questions?.length || 0} preguntas</div>
                <button class="delete-exam bg-red-500 text-white px-2 py-1 rounded text-sm mt-2" data-id="${e.id}">Eliminar</button>
            </div>
        `).join('');
        document.querySelectorAll('.delete-exam').forEach(btn => btn.onclick = async () => { await deleteDoc(doc(examsRef, btn.dataset.id)); showToast("Examen eliminado"); });
    }

    function renderStudentsList() {
        const grade = document.getElementById('filterStudentsGrade')?.value;
        const container = document.getElementById('studentsList');
        if (!container) return;
        if (!grade) { container.innerHTML = '<p>Selecciona un grado</p>'; return; }
        const filtered = allStudents.filter(s => s.grade === grade);
        container.innerHTML = filtered.map(s => `
            <div class="bg-white dark:bg-gray-800 p-2 rounded shadow flex justify-between items-center">
                <div><strong>${escapeHtml(s.name)}</strong><br>📞 ${s.phones?.join(', ') || ''}</div>
                <button class="delete-student bg-red-500 text-white px-2 py-1 rounded text-sm" data-id="${s.id}">Eliminar</button>
            </div>
        `).join('');
        document.querySelectorAll('.delete-student').forEach(btn => btn.onclick = async () => { await deleteDoc(doc(studentsRef, btn.dataset.id)); showToast("Estudiante eliminado"); });
    }

    async function renderGradesTable() {
        const tbody = document.getElementById('gradesTableBody');
        if (!tbody) return;
        const gradeFilter = document.getElementById('filterGrade')?.value;
        const areaFilter = document.getElementById('filterArea')?.value;
        if (!gradeFilter || !areaFilter) { tbody.innerHTML = '<tr><td colspan="5">Selecciona grado y área</td></tr>'; return; }
        const filtered = allResults.filter(r => {
            const student = allStudents.find(s => s.id === r.studentId);
            const exam = allExams.find(e => e.id === r.examId);
            return (student?.grade === gradeFilter) && (exam?.area === areaFilter);
        });
        if (filtered.length === 0) { tbody.innerHTML = '<tr><td colspan="5">No hay notas</td></tr>'; return; }
        tbody.innerHTML = filtered.map(r => {
            const student = allStudents.find(s => s.id === r.studentId);
            const studentName = student?.name || 'Desconocido';
            const phone = student?.phones?.[0] || '';
            return `
                <tr class="border-b">
                    <td class="p-2">${escapeHtml(studentName)}</td>
                    <td>${escapeHtml(r.examTitle)}</td>
                    <td class="font-bold">${r.grade}</td>
                    <td class="text-center">
                        <button class="view-results-btn text-blue-600 mr-2" data-result-id="${r.id}" data-student="${escapeHtml(studentName)}" data-exam-id="${r.examId}">Ver</button>
                        <button class="download-report-btn text-emerald-600 mr-2" data-result-id="${r.id}" data-student="${escapeHtml(studentName)}" data-exam-id="${r.examId}">Reporte</button>
                        <button class="whatsapp-btn text-green-600" data-phone="${phone}" data-grade="${r.grade}" data-exam="${escapeHtml(r.examTitle)}">WhatsApp</button>
                    </td>
                    <td class="text-right text-xs">${r.date ? new Date(r.date.toMillis()).toLocaleDateString() : ''}</td>
                </tr>
            `;
        }).join('');
        // Eventos
        document.querySelectorAll('.view-results-btn').forEach(btn => btn.onclick = () => viewStudentAnswers(btn.dataset.resultId, btn.dataset.student, btn.dataset.examId));
        document.querySelectorAll('.download-report-btn').forEach(btn => btn.onclick = () => downloadPDFReport(btn.dataset.resultId, btn.dataset.student, btn.dataset.examId));
        document.querySelectorAll('.whatsapp-btn').forEach(btn => btn.onclick = () => { if(btn.dataset.phone) window.open(`https://wa.me/${btn.dataset.phone}?text=Resultado: ${btn.dataset.exam} - Nota: ${btn.dataset.grade}`); });
    }

    // ========== FUNCIONES DE REPORTE PDF ==========
    async function downloadPDFReport(resultId, studentName, examId) {
        try {
            const resultDoc = await getDoc(doc(resultsRef, resultId));
            if (!resultDoc.exists()) throw new Error("Resultado no encontrado");
            const result = resultDoc.data();
            const examDoc = await getDoc(doc(examsRef, examId));
            if (!examDoc.exists()) throw new Error("Examen no encontrado");
            const exam = examDoc.data();
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            pdf.setFontSize(20);
            pdf.text(`Reporte: ${exam.title}`, 20, 20);
            pdf.setFontSize(12);
            pdf.text(`Estudiante: ${studentName}`, 20, 30);
            pdf.text(`Calificación: ${result.grade} (${result.score}/${result.total})`, 20, 36);
            pdf.text(`Fecha: ${new Date().toLocaleString()}`, 20, 42);
            let y = 55;
            exam.questions.forEach((q, idx) => {
                if (y > 270) { pdf.addPage(); y = 20; }
                const userAns = result.answers[idx] !== undefined ? result.answers[idx] : -1;
                const userText = userAns === -1 ? "No respondió" : q.options[userAns];
                pdf.setFontSize(10);
                pdf.text(`${idx+1}. ${q.text}`, 20, y);
                y += 5;
                pdf.text(`   Tu respuesta: ${userText}`, 25, y);
                y += 5;
                pdf.text(`   Correcta: ${q.options[q.correct]}`, 25, y);
                y += 7;
            });
            pdf.save(`Reporte_${exam.title}_${studentName}.pdf`);
            showToast("Reporte descargado", "success");
        } catch(e) { showToast("Error al generar reporte", "error"); console.error(e); }
    }

    async function viewStudentAnswers(resultId, studentName, examId) {
        const resultDoc = await getDoc(doc(resultsRef, resultId));
        if (!resultDoc.exists()) return showToast("No encontrado");
        const result = resultDoc.data();
        const examDoc = await getDoc(doc(examsRef, examId));
        if (!examDoc.exists()) return showToast("Examen no encontrado");
        const exam = examDoc.data();
        const modal = document.getElementById('viewAnswersModal');
        document.getElementById('viewAnswersTitle').innerHTML = `${exam.title} - ${studentName}`;
        let html = `<div class="mb-2 font-bold">Calificación: ${result.grade} (${result.score}/${result.total})</div>`;
        exam.questions.forEach((q, idx) => {
            const userAns = result.answers[idx] !== undefined ? result.answers[idx] : -1;
            const userText = userAns === -1 ? "No respondió" : q.options[userAns];
            const isCorrect = userAns === q.correct;
            html += `<div class="border p-2 mb-2 rounded">
                        <p><strong>${idx+1}. ${q.text}</strong></p>
                        <p>Tu respuesta: ${userText} ${isCorrect ? '✅' : '❌'}</p>
                        <p class="text-blue-600">Correcta: ${q.options[q.correct]}</p>
                    </div>`;
        });
        document.getElementById('viewAnswersContent').innerHTML = html;
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    // ========== ESTUDIANTE ==========
    function renderStudentTasks() {
        const container = document.getElementById('studentTasksList');
        if (!container || !currentStudent) return;
        const tasks = allTasks.filter(t => t.grade === currentStudent.grade);
        container.innerHTML = tasks.map(t => `
            <div class="bg-white dark:bg-gray-800 p-3 rounded shadow">
                <div class="font-bold">${escapeHtml(t.title)}</div>
                <div>${t.area}</div>
                <p class="text-sm">${escapeHtml(t.description)}</p>
                ${t.fileURL ? `<a href="${t.fileURL}" target="_blank" class="text-blue-500 text-sm">📎 Recurso guía</a>` : ''}
                ${t.link ? `<a href="${t.link}" target="_blank" class="text-blue-500 text-sm ml-2">🔗 Enlace</a>` : ''}
                <div class="mt-2">
                    <input type="file" id="file_${t.id}" class="text-sm">
                    <button class="submit-task bg-emerald-500 text-white px-3 py-1 rounded text-sm mt-1" data-taskid="${t.id}" data-title="${escapeHtml(t.title)}" data-area="${escapeHtml(t.area)}">Entregar tarea</button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.submit-task').forEach(btn => btn.onclick = async () => {
            const taskId = btn.dataset.taskid;
            const file = document.getElementById(`file_${taskId}`).files[0];
            if (!file) return showToast("Selecciona un archivo");
            const storageRef = ref(storage, `submissions/${currentStudent.id}_${taskId}_${Date.now()}_${file.name}`);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            await addDoc(submissionsRef, {
                studentId: currentStudent.id, studentName: currentStudent.name, studentGrade: currentStudent.grade,
                taskId, taskTitle: btn.dataset.title, taskArea: btn.dataset.area, fileURL: url, submittedAt: serverTimestamp()
            });
            showToast("Tarea entregada", "success");
            document.getElementById(`file_${taskId}`).value = '';
        });
    }

    function renderStudentExams() {
        const container = document.getElementById('studentExamsList');
        if (!container || !currentStudent) return;
        const exams = allExams.filter(e => e.grade === currentStudent.grade);
        container.innerHTML = exams.map(e => `
            <div class="bg-white dark:bg-gray-800 p-3 rounded shadow flex justify-between items-center">
                <div><div class="font-bold">${escapeHtml(e.title)}</div><div>${e.area}</div><div>${e.questions.length} preguntas</div></div>
                <button class="take-exam bg-purple-600 text-white px-3 py-1 rounded" data-exam='${JSON.stringify(e)}'>Rendir</button>
            </div>
        `).join('');
        document.querySelectorAll('.take-exam').forEach(btn => btn.onclick = () => startExam(JSON.parse(btn.dataset.exam)));
    }

    async function startExam(exam) {
        // Verificar si ya rindió
        const already = allResults.some(r => r.studentId === currentStudent.id && r.examId === exam.id);
        if (already) { showToast("Ya rendiste este examen", "info"); return; }
        const modal = document.getElementById('examTakeModal');
        document.getElementById('examTakeTitle').innerText = exam.title;
        const questionsDiv = document.getElementById('examTakeQuestions');
        questionsDiv.innerHTML = exam.questions.map((q, idx) => `
            <div class="mb-3 border p-2 rounded">
                <p class="font-bold">${idx+1}. ${escapeHtml(q.text)}</p>
                ${q.options.map((opt, i) => `<label class="block"><input type="radio" name="q${idx}" value="${i}"> ${escapeHtml(opt)}</label>`).join('')}
            </div>
        `).join('');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        const submitBtn = document.getElementById('submitExamBtn');
        const cancelBtn = document.getElementById('cancelExam');
        const newSubmit = submitBtn.cloneNode(true);
        const newCancel = cancelBtn.cloneNode(true);
        submitBtn.parentNode.replaceChild(newSubmit, submitBtn);
        cancelBtn.parentNode.replaceChild(newCancel, cancelBtn);
        newCancel.onclick = () => { modal.classList.add('hidden'); modal.classList.remove('flex'); };
        newSubmit.onclick = async () => {
            const answers = [];
            exam.questions.forEach((_, idx) => {
                const selected = document.querySelector(`input[name="q${idx}"]:checked`);
                answers.push(selected ? parseInt(selected.value) : -1);
            });
            let correct = 0;
            exam.questions.forEach((q, idx) => { if (answers[idx] === q.correct) correct++; });
            const percent = (correct / exam.questions.length) * 100;
            let grade = "C";
            if (percent >= 90) grade = "AD";
            else if (percent >= 75) grade = "A";
            else if (percent >= 60) grade = "B";
            const resultRef = await addDoc(resultsRef, {
                studentId: currentStudent.id, studentName: currentStudent.name, studentGrade: currentStudent.grade,
                examId: exam.id, examTitle: exam.title, examArea: exam.area, grade, score: correct, total: exam.questions.length,
                date: serverTimestamp(), answers
            });
            showToast(`Nota: ${grade} (${correct}/${exam.questions.length})`, "success");
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            // Descarga automática del reporte
            await downloadPDFReport(resultRef.id, currentStudent.name, exam.id);
            // Preguntar si enviar por WhatsApp
            if (currentStudent.phones && currentStudent.phones[0]) {
                if (confirm("¿Enviar resultado por WhatsApp a tus padres?")) {
                    window.open(`https://wa.me/${currentStudent.phones[0].replace(/\s/g,'')}?text=Mi examen "${exam.title}" obtuve ${grade}`, '_blank');
                }
            }
            renderStudentGrades();
        };
    }

    function renderStudentGrades() {
        const container = document.getElementById('studentGradesList');
        if (!container || !currentStudent) return;
        const myResults = allResults.filter(r => r.studentId === currentStudent.id);
        container.innerHTML = myResults.map(r => `
            <div class="bg-white dark:bg-gray-800 p-3 rounded shadow">
                <div class="font-bold">${escapeHtml(r.examTitle)}</div>
                <div class="text-2xl font-bold">${r.grade}</div>
                <div>${r.score}/${r.total}</div>
                <button class="view-my-exam text-blue-600 text-sm mt-1" data-result-id="${r.id}" data-exam-id="${r.examId}">Ver respuestas</button>
            </div>
        `).join('');
        document.querySelectorAll('.view-my-exam').forEach(btn => btn.onclick = () => viewStudentAnswers(btn.dataset.resultId, currentStudent.name, btn.dataset.examId));
    }

    // ========== EVENTOS ==========
    document.getElementById('teacherBtn').onclick = () => document.getElementById('teacherModal').classList.remove('hidden');
    document.getElementById('closeTeacherModal').onclick = () => document.getElementById('teacherModal').classList.add('hidden');
    document.getElementById('loginTeacher').onclick = () => {
        if (document.getElementById('teacherPass').value === 'profemanu2026') {
            document.getElementById('teacherModal').classList.add('hidden');
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('teacherPanel').classList.remove('hidden');
            populateGradeSelects();
            loadData();
        } else showToast("Contraseña incorrecta");
    };
    document.getElementById('logoutTeacherPanel').onclick = () => {
        document.getElementById('teacherPanel').classList.add('hidden');
        document.getElementById('welcomeScreen').classList.remove('hidden');
    };

    document.getElementById('studentBtn').onclick = async () => {
        await seedInitialStudents();
        populateGradeSelects();
        document.getElementById('studentModal').classList.remove('hidden');
        const gradeSelect = document.getElementById('studentGradeSelect');
        const nameSelect = document.getElementById('studentNameSelect');
        const loadNames = async () => {
            const grade = gradeSelect.value;
            const students = allStudents.filter(s => s.grade === grade);
            nameSelect.innerHTML = '<option value="">-- Selecciona --</option>' + students.map(s => `<option value='${JSON.stringify({ id: s.id, name: s.name, grade: s.grade, phones: s.phones })}'>${escapeHtml(s.name)}</option>`).join('');
        };
        gradeSelect.onchange = loadNames;
        await loadNames();
    };
    document.getElementById('enterStudent').onclick = () => {
        const val = document.getElementById('studentNameSelect').value;
        if (!val) return showToast("Selecciona tu nombre");
        currentStudent = JSON.parse(val);
        document.getElementById('studentModal').classList.add('hidden');
        document.getElementById('welcomeScreen').classList.add('hidden');
        document.getElementById('studentPanel').classList.remove('hidden');
        document.getElementById('studentNameSpan').innerText = currentStudent.name;
        document.getElementById('studentGradeSpan').innerText = currentStudent.grade;
        // Cargar datos en tiempo real para el estudiante
        const unsubTasks = onSnapshot(tasksRef, () => renderStudentTasks());
        const unsubExams = onSnapshot(examsRef, () => renderStudentExams());
        const unsubResults = onSnapshot(resultsRef, () => { renderStudentGrades(); renderStudentExams(); });
        renderStudentTasks(); renderStudentExams(); renderStudentGrades();
    };
    document.getElementById('closeStudentModal').onclick = () => document.getElementById('studentModal').classList.add('hidden');
    document.getElementById('logoutStudentPanel').onclick = () => {
        document.getElementById('studentPanel').classList.add('hidden');
        document.getElementById('welcomeScreen').classList.remove('hidden');
        currentStudent = null;
    };

    // Pestañas docente
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'bg-indigo-600', 'text-white'));
            btn.classList.add('active', 'bg-indigo-600', 'text-white');
            document.querySelectorAll('.tab-content').forEach(div => div.classList.add('hidden'));
            document.getElementById(btn.dataset.tab).classList.remove('hidden');
        };
    });
    document.querySelectorAll('.student-tab-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.student-tab-btn').forEach(b => b.classList.remove('active', 'bg-emerald-600', 'text-white'));
            btn.classList.add('active', 'bg-emerald-600', 'text-white');
            document.querySelectorAll('.student-tab-content').forEach(div => div.classList.add('hidden'));
            document.getElementById(btn.dataset.stab).classList.remove('hidden');
        };
    });

    // Publicar tarea
    document.getElementById('publishTask').onclick = async () => {
        const title = document.getElementById('taskTitle').value;
        const grade = document.getElementById('taskGrade').value;
        const area = document.getElementById('taskArea').value;
        const desc = document.getElementById('taskDesc').value;
        const file = document.getElementById('taskFileInput').files[0];
        const link = document.getElementById('taskLink').value;
        if (!title || !grade || !area) return showToast("Complete título, grado y área");
        let fileURL = null;
        if (file) {
            const storageRef = ref(storage, `tasks/${Date.now()}_${file.name}`);
            await uploadBytes(storageRef, file);
            fileURL = await getDownloadURL(storageRef);
        }
        await addDoc(tasksRef, { title, grade, area, description: desc, fileURL, link, createdAt: serverTimestamp() });
        showToast("Tarea publicada");
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDesc').value = '';
        document.getElementById('taskFileInput').value = '';
        document.getElementById('taskLink').value = '';
    };

    // Generar preguntas con IA
    document.getElementById('generateQuestions').onclick = async () => {
        const topic = document.getElementById('examTopic').value;
        const num = parseInt(document.getElementById('numQuestions').value);
        if (!topic) return showToast("Escribe un tema");
        const btn = document.getElementById('generateQuestions');
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div> Generando...';
        try {
            const response = await fetch("https://api.deepseek.com/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${DEEPSEEK_API_KEY}` },
                body: JSON.stringify({
                    model: "deepseek-chat",
                    messages: [{ role: "user", content: `Genera ${num} preguntas de opción múltiple sobre: "${topic}". Devuelve SOLO JSON: [{"text":"...","options":["a","b","c","d"],"correct":0}]` }],
                    temperature: 0.7
                })
            });
            const data = await response.json();
            let content = data.choices[0].message.content;
            let clean = content.replace(/```json/g,'').replace(/```/g,'').trim();
            let questions = JSON.parse(clean);
            const editor = document.getElementById('questionsEditor');
            editor.innerHTML = '';
            questions.forEach((q, idx) => {
                const div = document.createElement('div');
                div.className = 'border p-2 mb-2 rounded relative';
                div.innerHTML = `
                    <button class="remove-question text-red-500 absolute top-1 right-1">🗑️</button>
                    <input type="text" placeholder="Pregunta" value="${escapeHtml(q.text)}" class="w-full border p-1 mb-1">
                    <div class="grid grid-cols-2 gap-1">
                        ${q.options.map((opt,i) => `<input type="text" placeholder="Opción ${i+1}" value="${escapeHtml(opt)}" class="border p-1">`).join('')}
                    </div>
                    <select class="correct-option mt-1 border p-1">
                        <option value="0" ${q.correct===0?'selected':''}>Opción 1 correcta</option>
                        <option value="1" ${q.correct===1?'selected':''}>Opción 2 correcta</option>
                        <option value="2" ${q.correct===2?'selected':''}>Opción 3 correcta</option>
                        <option value="3" ${q.correct===3?'selected':''}>Opción 4 correcta</option>
                    </select>
                `;
                editor.appendChild(div);
            });
            document.querySelectorAll('.remove-question').forEach(btn => btn.onclick = function() { this.closest('.border').remove(); });
            showToast("Preguntas generadas", "success");
        } catch(e) { showToast("Error con IA, usa preguntas manuales", "error"); } finally { btn.disabled = false; btn.innerHTML = "Generar con IA"; }
    };

    // Publicar examen
    document.getElementById('publishExam').onclick = async () => {
        const title = document.getElementById('examTitle').value;
        const grade = document.getElementById('examGrade').value;
        const area = document.getElementById('examArea').value;
        const questionDivs = document.querySelectorAll('#questionsEditor > div');
        const questions = [];
        questionDivs.forEach(div => {
            const inputs = div.querySelectorAll('input[type="text"]');
            const text = inputs[0].value;
            const options = [inputs[1].value, inputs[2].value, inputs[3].value, inputs[4].value];
            const correct = parseInt(div.querySelector('.correct-option').value);
            if (text && options.every(o=>o)) questions.push({ text, options, correct });
        });
        if (!title || !grade || !area || questions.length === 0) return showToast("Complete todos los campos y al menos una pregunta");
        await addDoc(examsRef, { title, grade, area, questions, createdAt: serverTimestamp() });
        showToast("Examen publicado");
        document.getElementById('examTitle').value = '';
        document.getElementById('examTopic').value = '';
        document.getElementById('questionsEditor').innerHTML = '';
        document.getElementById('numQuestions').value = '5';
    };

    // Agregar estudiante
    document.getElementById('addStudent').onclick = async () => {
        const name = document.getElementById('newStudentName').value.trim().toUpperCase();
        const grade = document.getElementById('newStudentGrade').value;
        const phone = document.getElementById('newStudentPhone').value.trim();
        if (!name || !grade) return showToast("Nombre y grado requeridos");
        await addDoc(studentsRef, { name, grade, phones: phone ? [phone] : [] });
        showToast("Estudiante agregado");
        document.getElementById('newStudentName').value = '';
        document.getElementById('newStudentPhone').value = '';
    };

    // Filtros
    document.getElementById('filterTasksGrade')?.addEventListener('change', () => renderTasksList());
    document.getElementById('filterTasksArea')?.addEventListener('change', () => renderTasksList());
    document.getElementById('filterGrade')?.addEventListener('change', () => renderGradesTable());
    document.getElementById('filterArea')?.addEventListener('change', () => renderGradesTable());
    document.getElementById('filterStudentsGrade')?.addEventListener('change', () => renderStudentsList());
    document.getElementById('refreshGrades')?.addEventListener('click', () => renderGradesTable());

    // Cerrar modal de respuestas
    document.getElementById('closeAnswersModal')?.addEventListener('click', () => {
        document.getElementById('viewAnswersModal').classList.add('hidden');
        document.getElementById('viewAnswersModal').classList.remove('flex');
    });

    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }
</script>
</body>
</html>
