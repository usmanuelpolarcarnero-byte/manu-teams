<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduGestor IA - Aula Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #ffffff; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 24px; right: 24px; background-color: #1f2937; color: white; padding: 12px 20px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.02); }
        .dark { background-color: #111827; color: #f3f4f6; }
        .dark .card { background-color: #1f2937; border-color: #374151; }
        .dark input, .dark select, .dark textarea { background-color: #374151; color: #f3f4f6; border-color: #4b5563; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 transition-colors">

<div id="toast" class="toast"></div>

<!-- Pantalla de bienvenida -->
<div id="welcomeScreen" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-indigo-50 to-blue-50">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center border border-gray-100">
        <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-brain text-3xl text-indigo-600"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">EduGestor IA</h1>
        <p class="text-gray-500 mb-6">Plataforma educativa con inteligencia artificial</p>
        <button id="teacherBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition shadow-md mb-3">Acceso Docente</button>
        <button id="studentBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl transition shadow-md">Acceso Estudiante</button>
    </div>
</div>

<!-- Modal docente -->
<div id="teacherModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl p-6 w-96 shadow-xl">
        <h2 class="text-xl font-bold mb-4">Acceso Docente</h2>
        <input type="password" id="teacherPass" placeholder="Contraseña" class="w-full border border-gray-300 p-3 rounded-lg mb-4 focus:ring-2 focus:ring-indigo-500">
        <button id="loginTeacher" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">Ingresar</button>
        <button id="closeTeacherModal" class="w-full text-gray-500 mt-2 text-sm">Cancelar</button>
    </div>
</div>

<!-- Modal estudiante -->
<div id="studentModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl p-6 w-96 shadow-xl">
        <h2 class="text-xl font-bold mb-4">Selecciona tu grado</h2>
        <select id="studentGradeSelect" class="w-full border border-gray-300 p-3 rounded-lg mb-3 focus:ring-2 focus:ring-emerald-500"></select>
        <select id="studentNameSelect" class="w-full border border-gray-300 p-3 rounded-lg mb-4 focus:ring-2 focus:ring-emerald-500"></select>
        <button id="enterStudent" class="w-full bg-emerald-600 text-white py-2 rounded-lg font-semibold hover:bg-emerald-700 transition">Entrar</button>
        <button id="closeStudentModal" class="w-full text-gray-500 mt-2 text-sm">Cancelar</button>
    </div>
</div>

<!-- Panel Docente -->
<div id="teacherPanel" class="hidden min-h-screen bg-gray-50">
    <nav class="bg-white shadow-md border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <h2 class="text-xl font-bold text-indigo-600"><i class="fas fa-chalkboard-teacher mr-2"></i>Panel Docente</h2>
            <button id="logoutTeacherPanel" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg transition">Salir</button>
        </div>
    </nav>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="flex flex-wrap gap-2 border-b border-gray-200 mb-6">
            <button class="tab-btn active bg-indigo-600 text-white px-5 py-2 rounded-t-lg transition" data-tab="tasksTab">📝 Tareas</button>
            <button class="tab-btn bg-gray-200 text-gray-700 px-5 py-2 rounded-t-lg transition" data-tab="examsTab">📋 Exámenes</button>
            <button class="tab-btn bg-gray-200 text-gray-700 px-5 py-2 rounded-t-lg transition" data-tab="gradesTab">📊 Calificaciones</button>
            <button class="tab-btn bg-gray-200 text-gray-700 px-5 py-2 rounded-t-lg transition" data-tab="studentsTab">👥 Estudiantes</button>
        </div>

        <!-- Tareas -->
        <div id="tasksTab" class="tab-content">
            <div class="bg-white rounded-xl shadow-sm p-6 mb-8 border border-gray-100">
                <h3 class="text-lg font-bold mb-4 flex items-center"><i class="fas fa-plus-circle text-indigo-500 mr-2"></i>Nueva Tarea</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="taskTitle" placeholder="Título (obligatorio)" class="border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-indigo-500">
                    <select id="taskGrade" class="border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-indigo-500"><option value="">-- Grado (opcional) --</option></select>
                    <select id="taskArea" class="border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-indigo-500"><option value="">-- Área (opcional) --</option></select>
                    <div class="flex gap-2">
                        <textarea id="taskDesc" placeholder="Descripción (opcional)" class="border border-gray-300 p-3 rounded-lg flex-1 focus:ring-2 focus:ring-indigo-500" rows="3"></textarea>
                        <button id="generateTaskDesc" class="bg-purple-600 hover:bg-purple-700 text-white px-4 rounded-lg transition"><i class="fas fa-magic"></i> Generar IA</button>
                    </div>
                    <div class="md:col-span-2 flex flex-col md:flex-row gap-4">
                        <div class="flex-1"><label class="block text-sm font-medium text-gray-700 mb-1">Archivo guía (PDF, Word, TXT)</label><input type="file" id="taskFile" accept=".pdf,.doc,.docx,.txt" class="w-full border border-gray-300 p-2 rounded-lg"></div>
                        <div class="flex-1"><label class="block text-sm font-medium text-gray-700 mb-1">Enlace (YouTube, web)</label><input type="text" id="taskLink" placeholder="https://..." class="w-full border border-gray-300 p-2 rounded-lg"></div>
                    </div>
                    <button id="publishTask" class="md:col-span-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition shadow-md">Publicar Tarea</button>
                </div>
            </div>
            <h3 class="font-bold text-lg mb-3">Tareas publicadas</h3>
            <div class="flex gap-3 mb-4">
                <select id="filterTasksGrade" class="border border-gray-300 p-2 rounded-lg"></select>
                <select id="filterTasksArea" class="border border-gray-300 p-2 rounded-lg"></select>
                <button id="refreshTasks" class="bg-gray-500 text-white px-3 py-1 rounded-lg">Refrescar</button>
            </div>
            <div id="tasksList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <!-- Exámenes -->
        <div id="examsTab" class="tab-content hidden">
            <div class="bg-white rounded-xl shadow-sm p-6 mb-8 border border-gray-100">
                <h3 class="text-lg font-bold mb-4 flex items-center"><i class="fas fa-robot text-purple-500 mr-2"></i>Crear Examen con IA</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <input type="text" id="examTitle" placeholder="Título" class="border border-gray-300 p-3 rounded-lg">
                    <select id="examGrade" class="border border-gray-300 p-3 rounded-lg"></select>
                    <select id="examArea" class="border border-gray-300 p-3 rounded-lg"></select>
                </div>
                <div class="flex flex-col md:flex-row gap-4 mb-4">
                    <textarea id="examTopic" placeholder="Describe el tema para generar preguntas" class="border border-gray-300 p-3 rounded-lg flex-1" rows="2"></textarea>
                    <div class="bg-gray-50 p-3 rounded-lg flex items-center gap-2">
                        <label class="font-semibold">Nº preguntas:</label>
                        <input type="number" id="numQuestions" value="5" min="1" class="border p-2 rounded w-20">
                        <button id="generateQuestions" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg transition"><i class="fas fa-bolt"></i> Generar IA</button>
                    </div>
                </div>
                <div id="questionsEditor" class="space-y-3 mb-4 max-h-96 overflow-auto"></div>
                <button id="publishExam" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-lg w-full transition shadow-md">Publicar Examen</button>
            </div>
            <h3 class="font-bold text-lg mb-3">Exámenes activos</h3>
            <div id="examsList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <!-- Calificaciones -->
        <div id="gradesTab" class="tab-content hidden">
            <div class="bg-white rounded-xl shadow-sm p-6 mb-4">
                <div class="flex flex-col sm:flex-row gap-4 mb-4">
                    <select id="filterGrade" class="border p-2 rounded-lg flex-1"></select>
                    <select id="filterArea" class="border p-2 rounded-lg flex-1"></select>
                    <button id="refreshGrades" class="bg-indigo-600 text-white px-4 py-2 rounded-lg">Refrescar</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse">
                        <thead><tr class="bg-gray-100 border-b"><th class="p-3 text-left">Estudiante</th><th>Examen</th><th>Nota</th><th>Acciones</th><th>Fecha</th></tr></thead>
                        <tbody id="gradesTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Estudiantes -->
        <div id="studentsTab" class="tab-content hidden">
            <div class="bg-white rounded-xl shadow-sm p-6">
                <h3 class="text-lg font-bold mb-4">Agregar estudiante</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
                    <input type="text" id="newStudentName" placeholder="Apellidos y nombres" class="border p-3 rounded-lg">
                    <select id="newStudentGrade" class="border p-3 rounded-lg"></select>
                    <input type="text" id="newStudentPhone" placeholder="Teléfono" class="border p-3 rounded-lg">
                    <button id="addStudent" class="md:col-span-3 bg-emerald-600 text-white py-2 rounded-lg">Guardar estudiante</button>
                </div>
                <hr class="my-4">
                <label class="font-semibold block mb-2">Filtrar por grado:</label>
                <select id="filterStudentsGrade" class="w-full border p-3 rounded-lg mb-2"></select>
                <button id="refreshStudentsListBtn" class="bg-indigo-500 text-white px-3 py-1 rounded-lg text-sm mb-4">Refrescar lista</button>
                <div id="studentsList" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>
        </div>
    </div>
</div>

<!-- Panel Estudiante -->
<div id="studentPanel" class="hidden min-h-screen bg-gray-50">
    <nav class="bg-white shadow-md border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3"><i class="fas fa-user-graduate text-emerald-600 text-xl"></i><span id="studentNameSpan" class="font-bold text-gray-800"></span><span id="studentGradeSpan" class="text-sm text-gray-500"></span></div>
            <button id="logoutStudentPanel" class="bg-red-500 text-white px-4 py-2 rounded-lg">Salir</button>
        </div>
    </nav>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="flex flex-wrap gap-2 border-b mb-6">
            <button class="student-tab-btn active bg-emerald-600 text-white px-5 py-2 rounded-t-lg" data-stab="studentTasksTab">📚 Mis Tareas</button>
            <button class="student-tab-btn bg-gray-200 text-gray-700 px-5 py-2 rounded-t-lg" data-stab="studentExamsTab">📝 Evaluaciones</button>
            <button class="student-tab-btn bg-gray-200 text-gray-700 px-5 py-2 rounded-t-lg" data-stab="studentGradesTab">⭐ Calificaciones</button>
        </div>
        <div id="studentTasksTab" class="student-tab-content"><div id="studentTasksList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div></div>
        <div id="studentExamsTab" class="student-tab-content hidden"><div id="studentExamsList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div></div>
        <div id="studentGradesTab" class="student-tab-content hidden"><div id="studentGradesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div></div>
    </div>
</div>

<!-- Modales -->
<div id="examTakeModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4 overflow-auto">
    <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-auto p-6">
        <h2 id="examTakeTitle" class="text-xl font-bold mb-4"></h2>
        <div id="examTakeQuestions"></div>
        <div class="flex justify-end gap-3 mt-6"><button id="cancelExam" class="bg-gray-300 px-4 py-2 rounded-lg">Cancelar</button><button id="submitExamBtn" class="bg-emerald-600 text-white px-6 py-2 rounded-lg">Enviar examen</button></div>
    </div>
</div>
<div id="viewAnswersModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4 overflow-auto">
    <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-auto p-6">
        <h2 id="viewAnswersTitle" class="text-xl font-bold mb-4"></h2>
        <div id="viewAnswersContent"></div>
        <button id="closeAnswersModal" class="bg-gray-500 text-white px-4 py-2 rounded-lg mt-4">Cerrar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, onSnapshot, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyClWwYzro_avn1pK0DvD4x1r4v1grSAoE0",
        authDomain: "registro-jn-andrews-mpc.firebaseapp.com",
        projectId: "registro-jn-andrews-mpc",
        storageBucket: "registro-jn-andrews-mpc.firebasestorage.app",
        messagingSenderId: "701752375464",
        appId: "1:701752375464:web:eaab256668b869d026aa9d"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const DEEPSEEK_API_KEY = "sk-70c41d62b6114a6d85b700e27a3c7534";

    const studentsRef = collection(db, 'students');
    const tasksRef = collection(db, 'tasks');
    const examsRef = collection(db, 'exams');
    const submissionsRef = collection(db, 'submissions');
    const resultsRef = collection(db, 'examResults');

    let currentUser = null;
    let currentStudent = null;
    let allStudents = [], allTasks = [], allExams = [], allResults = [];
    let unsubStudents, unsubTasks, unsubExams, unsubResults;

    function showToast(msg, type='info') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    const allGrades = ["PRIMERO DE PRIMARIA","SEGUNDO DE PRIMARIA","TERCERO DE PRIMARIA","CUARTO DE PRIMARIA","QUINTO DE PRIMARIA","SEXTO DE PRIMARIA","PRIMERO DE SECUNDARIA","SEGUNDO DE SECUNDARIA","TERCERO DE SECUNDARIA","CUARTO DE SECUNDARIA","QUINTO DE SECUNDARIA"];
    const allAreas = ["Matemáticas","Comunicación","Ciencias Sociales","Ciencia y Tecnología","Personal Social","Inglés","Arte y Cultura","Educación Física","Computación","Educación Religiosa","Tutoría","EPT"];

    function populateSelects() {
        const selects = ['taskGrade', 'examGrade', 'newStudentGrade', 'filterStudentsGrade', 'filterGrade', 'studentGradeSelect'];
        selects.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                const current = el.value;
                el.innerHTML = '<option value="">-- Seleccionar --</option>' + allGrades.map(g => `<option value="${g}">${g}</option>`).join('');
                if (current && allGrades.includes(current)) el.value = current;
            }
        });
        const areaSelects = ['taskArea', 'examArea', 'filterArea'];
        areaSelects.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                const current = el.value;
                el.innerHTML = '<option value="">-- Seleccionar --</option>' + allAreas.map(a => `<option value="${a}">${a}</option>`).join('');
                if (current && allAreas.includes(current)) el.value = current;
            }
        });
        const filterGrade = document.getElementById('filterTasksGrade');
        if (filterGrade) filterGrade.innerHTML = '<option value="">-- Todos los grados --</option>' + allGrades.map(g => `<option value="${g}">${g}</option>`).join('');
        const filterArea = document.getElementById('filterTasksArea');
        if (filterArea) filterArea.innerHTML = '<option value="">-- Todas las áreas --</option>' + allAreas.map(a => `<option value="${a}">${a}</option>`).join('');
    }

    signInAnonymously(auth).catch(e => console.error(e));
    onAuthStateChanged(auth, user => { currentUser = user; if (user) seedStudents(); });

    const initialStudents = [
        { name: "LLANQUE ALMIRON Yader Jocsan", grade: "QUINTO DE SECUNDARIA", phones: ["958005914"] },
        { name: "BATALLANOS SACSI Flor de Liz", grade: "PRIMERO DE PRIMARIA", phones: ["918274035"] }
    ];
    async function seedStudents() {
        const snap = await getDocs(studentsRef);
        if (snap.empty) {
            for (const s of initialStudents) await addDoc(studentsRef, s);
            showToast("Directorio inicial cargado", "success");
        }
    }

    function loadData() {
        if (unsubStudents) unsubStudents();
        if (unsubTasks) unsubTasks();
        if (unsubExams) unsubExams();
        if (unsubResults) unsubResults();
        unsubStudents = onSnapshot(studentsRef, snap => { allStudents = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderStudentsList(); renderGradesTable(); });
        unsubTasks = onSnapshot(tasksRef, snap => { allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderTasksList(); });
        unsubExams = onSnapshot(examsRef, snap => { allExams = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderExamsList(); });
        unsubResults = onSnapshot(resultsRef, snap => { allResults = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderGradesTable(); if (currentStudent) renderStudentGrades(); });
    }

    function renderTasksList() {
        const container = document.getElementById('tasksList');
        if (!container) return;
        const grade = document.getElementById('filterTasksGrade')?.value || '';
        const area = document.getElementById('filterTasksArea')?.value || '';
        const filtered = allTasks.filter(t => (!grade || t.grade === grade) && (!area || t.area === area));
        container.innerHTML = filtered.map(t => `
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden card-hover">
                <div class="p-4">
                    <div class="font-bold text-lg text-indigo-700">${escapeHtml(t.title)}</div>
                    <div class="text-sm text-gray-500 mb-2">${t.area || 'Sin área'} · ${t.grade || 'Sin grado'}</div>
                    <p class="text-gray-600 text-sm mb-3">${escapeHtml(t.description?.substring(0,100))}${t.description?.length>100?'...':''}</p>
                    ${t.fileURL ? `<a href="${t.fileURL}" target="_blank" class="text-indigo-600 text-sm inline-flex items-center"><i class="fas fa-paperclip mr-1"></i> Archivo adjunto</a>` : ''}
                    ${t.link ? `<a href="${t.link}" target="_blank" class="text-blue-600 text-sm ml-3 inline-flex items-center"><i class="fas fa-link mr-1"></i> Enlace</a>` : ''}
                    <button class="delete-task mt-3 bg-red-100 text-red-600 px-3 py-1 rounded-lg text-sm w-full" data-id="${t.id}">Eliminar tarea</button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.delete-task').forEach(btn => btn.onclick = async () => { await deleteDoc(doc(tasksRef, btn.dataset.id)); showToast("Tarea eliminada"); });
    }
    function renderExamsList() {
        const container = document.getElementById('examsList');
        if (!container) return;
        container.innerHTML = allExams.map(e => `
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                <div class="font-bold text-emerald-700">${escapeHtml(e.title)}</div>
                <div class="text-sm text-gray-500">${e.area} · ${e.grade}</div>
                <div class="text-sm">${e.questions?.length || 0} preguntas</div>
                <button class="delete-exam mt-2 bg-red-100 text-red-600 px-3 py-1 rounded-lg text-sm" data-id="${e.id}">Eliminar examen</button>
            </div>
        `).join('');
        document.querySelectorAll('.delete-exam').forEach(btn => btn.onclick = async () => { await deleteDoc(doc(examsRef, btn.dataset.id)); showToast("Examen eliminado"); });
    }
    function renderStudentsList() {
        const container = document.getElementById('studentsList');
        const gradeSelect = document.getElementById('filterStudentsGrade');
        if (!container || !gradeSelect) return;
        const selectedGrade = gradeSelect.value;
        if (!selectedGrade) {
            container.innerHTML = '<p class="text-gray-500 col-span-full text-center">Selecciona un grado para ver los estudiantes</p>';
            return;
        }
        const filtered = allStudents.filter(s => s.grade === selectedGrade);
        if (filtered.length === 0) {
            container.innerHTML = `<p class="text-gray-500 col-span-full text-center">No hay estudiantes en el grado ${escapeHtml(selectedGrade)}</p>`;
            return;
        }
        container.innerHTML = filtered.map(s => `
            <div class="bg-white rounded-lg shadow-sm p-3 flex justify-between items-center border">
                <div><strong>${escapeHtml(s.name)}</strong><br><span class="text-xs text-gray-500">📞 ${s.phones?.join(', ') || ''}</span></div>

    async function downloadPDFReport(resultId, studentName, examId) {
        try {
            const resultDoc = await getDoc(doc(resultsRef, resultId));
            if (!resultDoc.exists()) throw new Error();
            const result = resultDoc.data();
            const examDoc = await getDoc(doc(examsRef, examId));
            if (!examDoc.exists()) throw new Error();
            const exam = examDoc.data();
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            pdf.setFontSize(20);
            pdf.text(`Reporte: ${exam.title}`, 20, 20);
            pdf.setFontSize(12);
            pdf.text(`Estudiante: ${studentName}`, 20, 30);
            pdf.text(`Calificación: ${result.grade} (${result.score}/${result.total})`, 20, 36);
            pdf.text(`Fecha: ${new Date().toLocaleString()}`, 20, 42);
            let y = 55;
            exam.questions.forEach((q, idx) => {
                if (y > 270) { pdf.addPage(); y = 20; }
                const userAns = result.answers[idx] !== undefined ? result.answers[idx] : -1;
                const userText = userAns === -1 ? "No respondió" : q.options[userAns];
                pdf.setFontSize(10);
                pdf.text(`${idx+1}. ${q.text}`, 20, y);
                y += 5;
                pdf.text(`   Tu respuesta: ${userText}`, 25, y);
                y += 5;
                pdf.text(`   Correcta: ${q.options[q.correct]}`, 25, y);
                y += 7;
            });
            pdf.save(`Reporte_${exam.title}_${studentName}.pdf`);
            showToast("Reporte descargado", "success");
        } catch(e) { showToast("Error al generar reporte", "error"); }
    }

    async function viewStudentAnswers(resultId, studentName, examId) {
        const resultDoc = await getDoc(doc(resultsRef, resultId));
        if (!resultDoc.exists()) return showToast("No encontrado");
        const result = resultDoc.data();
        const examDoc = await getDoc(doc(examsRef, examId));
        if (!examDoc.exists()) return showToast("Examen no encontrado");
        const exam = examDoc.data();
        const modal = document.getElementById('viewAnswersModal');
        document.getElementById('viewAnswersTitle').innerHTML = `${exam.title} - ${studentName}`;
        let html = `<div class="mb-3 p-2 bg-gray-100 rounded">Calificación: ${result.grade} (${result.score}/${result.total})</div>`;
        exam.questions.forEach((q, idx) => {
            const userAns = result.answers[idx] !== undefined ? result.answers[idx] : -1;
            const userText = userAns === -1 ? "No respondió" : q.options[userAns];
            const isCorrect = userAns === q.correct;
            html += `<div class="border p-3 mb-3 rounded-lg">
                        <p class="font-semibold">${idx+1}. ${escapeHtml(q.text)}</p>
                        <p>Tu respuesta: ${userText} ${isCorrect ? '✅' : '❌'}</p>
                        <p class="text-blue-600">Respuesta correcta: ${q.options[q.correct]}</p>
                    </div>`;
        });

    }

    async function startExam(exam) {
        const already = allResults.some(r => r.studentId === currentStudent.id && r.examId === exam.id);
        if (already) { showToast("Ya rendiste este examen", "info"); return; }
        const modal = document.getElementById('examTakeModal');
        document.getElementById('examTakeTitle').innerHTML = exam.title;
        const questionsDiv = document.getElementById('examTakeQuestions');
        questionsDiv.innerHTML = exam.questions.map((q, idx) => `
            <div class="mb-4 border-b pb-2">
                <p class="font-semibold mb-2">${idx+1}. ${escapeHtml(q.text)}</p>
                <div class="space-y-1 pl-4">${q.options.map((opt, i) => `<label class="flex items-center gap-2"><input type="radio" name="q${idx}" value="${i}"> ${escapeHtml(opt)}</label>`).join('')}</div>
            </div>
        `).join('');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        const submitBtn = document.getElementById('submitExamBtn');
        const cancelBtn = document.getElementById('cancelExam');
        const newSubmit = submitBtn.cloneNode(true);
        const newCancel = cancelBtn.cloneNode(true);
        submitBtn.parentNode.replaceChild(newSubmit, submitBtn);
        cancelBtn.parentNode.replaceChild(newCancel, cancelBtn);
        newCancel.onclick = () => { modal.classList.add('hidden'); modal.classList.remove('flex'); };
        newSubmit.onclick = async () => {
            const answers = [];
            exam.questions.forEach((_, idx) => { const selected = document.querySelector(`input[name="q${idx}"]:checked`); answers.push(selected ? parseInt(selected.value) : -1); });
            let correct = 0;
            exam.questions.forEach((q, idx) => { if (answers[idx] === q.correct) correct++; });
            const percent = (correct / exam.questions.length) * 100;
            let grade = "C";
            if (percent >= 90) grade = "AD";
            else if (percent >= 75) grade = "A";
            else if (percent >= 60) grade = "B";
            const resultRef = await addDoc(resultsRef, { studentId: currentStudent.id, studentName: currentStudent.name, studentGrade: currentStudent.grade, examId: exam.id, examTitle: exam.title, examArea: exam.area, grade, score: correct, total: exam.questions.length, date: serverTimestamp(), answers });
            showToast(`Nota: ${grade} (${correct}/${exam.questions.length})`, "success");
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            await downloadPDFReport(resultRef.id, currentStudent.name, exam.id);
            if (currentStudent.phones && currentStudent.phones[0]) {
                if (confirm("¿Enviar resultado por WhatsApp a tus padres?")) window.open(`https://wa.me/${currentStudent.phones[0].replace(/\s/g, '')}?text=Mi examen "${exam.title}" obtuve ${grade}`, '_blank');
            }
            renderStudentGrades();
        };
    }

    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }
</script>
