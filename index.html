<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduGestor IA - Aula Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #ffffff; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 12px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; display: flex; align-items: center; gap: 10px; color: white; font-weight: bold;}
        .toast.show { opacity: 1; }
        .toast-success { background: #10b981; }
        .toast-error { background: #ef4444; }
        .toast-info { background: #3b82f6; }
        .card-hover { transition: transform 0.2s; }
        .card-hover:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

<div id="toast-container" class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-3"></div>

<div id="customConfirmModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[100] p-4 backdrop-blur-sm">
    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
        <h3 id="confirmTitle" class="text-xl font-bold mb-2">Confirmación</h3>
        <p id="confirmMessage" class="text-gray-600 mb-6"></p>
        <div class="flex gap-3 justify-end">
            <button id="confirmCancelBtn" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition">Cancelar</button>
            <button id="confirmOkBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Aceptar</button>
        </div>
    </div>
</div>

<div id="welcomeScreen" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-indigo-50 to-blue-50">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
        <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-brain text-3xl text-indigo-600"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">EduGestor IA</h1>
        <p class="text-gray-500 mb-6">Plataforma educativa con inteligencia artificial</p>
        <div id="authLoading" class="hidden mb-4 text-indigo-600 font-bold"><i class="fas fa-spinner fa-spin"></i> Conectando al servidor...</div>
        <button id="teacherBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition mb-3">Acceso Docente</button>
        <button id="studentBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl transition">Acceso Estudiante</button>
        <p class="text-xs text-gray-400 mt-6">🔐 Entorno seguro y colaborativo.</p>
    </div>
</div>

<div id="teacherModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl p-6 w-96 shadow-xl">
        <h2 class="text-xl font-bold mb-4"><i class="fas fa-lock text-indigo-600 mr-2"></i>Acceso Docente</h2>
        <input type="password" id="teacherPass" placeholder="Contraseña" class="w-full border p-3 rounded-lg mb-4">
        <button id="loginTeacherBtn" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold">Ingresar</button>
        <button id="closeTeacherModal" class="w-full text-gray-500 mt-2 text-sm font-bold">Cancelar</button>
        <p class="text-xs text-center text-gray-400 mt-4">Demo: admin2026</p>
    </div>
</div>

<div id="studentModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl p-6 w-96 shadow-xl">
        <h2 class="text-xl font-bold mb-4">Selecciona tu grado</h2>
        <select id="studentGradeSelect" class="w-full border p-3 rounded-lg mb-3"></select>
        <select id="studentNameSelect" class="w-full border p-3 rounded-lg mb-4"></select>
        <button id="enterStudent" class="w-full bg-emerald-600 text-white py-2 rounded-lg font-bold">Entrar</button>
        <button id="closeStudentModal" class="w-full text-gray-500 mt-2 text-sm font-bold">Cancelar</button>

</div>

<div id="teacherPanel" class="hidden min-h-screen bg-gray-50">
    <!-- ... el contenido del panel docente es el mismo que antes, para ahorrar espacio lo omito aquí pero en el archivo final estará completo ... -->
</div>

<div id="studentPanel" class="hidden min-h-screen bg-gray-50">
    <nav class="bg-emerald-600 shadow-md border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center text-white">
            <div>
                <h2 id="studentNameSpan" class="text-xl font-bold"></h2>
                <span id="studentGradeSpan" class="text-sm text-emerald-100"></span>
            </div>
            <button id="logoutStudentPanel" class="bg-emerald-800 hover:bg-red-500 font-bold px-4 py-2 rounded-lg transition"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>
    </nav>
    <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex flex-wrap gap-2 border-b mb-6">
            <button class="student-tab-btn active bg-emerald-600 text-white px-6 py-3 rounded-t-lg font-bold" data-stab="studentTasksTab">📚 Mis Tareas</button>
            <button class="student-tab-btn bg-gray-200 text-gray-700 px-6 py-3 rounded-t-lg font-bold" data-stab="studentExamsTab">📝 Exámenes</button>
            <button class="student-tab-btn bg-gray-200 text-gray-700 px-6 py-3 rounded-t-lg font-bold" data-stab="studentGradesTab">⭐ Mis Notas</button>
        </div>

        <div id="studentTasksTab" class="student-tab-content">
            <div class="flex justify-end mb-3">
                <button id="refreshStudentTasks" class="bg-white border border-gray-300 text-gray-700 px-3 py-1 rounded-lg text-sm font-bold shadow-sm hover:bg-gray-50"><i class="fas fa-sync-alt"></i> Actualizar</button>
            </div>
            <div id="studentTasksList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
        <div id="studentExamsTab" class="student-tab-content hidden">
            <div class="flex justify-end mb-3">
                <button id="refreshStudentExams" class="bg-white border border-gray-300 text-gray-700 px-3 py-1 rounded-lg text-sm font-bold shadow-sm hover:bg-gray-50"><i class="fas fa-sync-alt"></i> Actualizar</button>
            </div>
            <div id="studentExamsList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>
        <div id="studentGradesTab" class="student-tab-content hidden">
            <div id="studentGradesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>
</div>

<div id="examTakeModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4 overflow-auto backdrop-blur-sm">
    <div class="bg-white rounded-2xl max-w-3xl w-full max-h-[90vh] flex flex-col shadow-2xl">
        <div class="p-6 border-b flex justify-between items-center bg-indigo-50 rounded-t-2xl">
            <h2 id="examTakeTitle" class="text-xl font-bold text-indigo-900"></h2>
            <div class="bg-white px-4 py-2 rounded-lg shadow font-mono text-red-600 font-bold border"><i class="fas fa-clock"></i> <span id="timer">30:00</span></div>
        </div>
        <div id="examTakeQuestions" class="p-6 overflow-y-auto flex-1 space-y-6"></div>
        <div class="p-4 border-t flex justify-end gap-3 bg-gray-50 rounded-b-2xl">
            <button id="cancelExam" class="bg-gray-300 px-6 py-2 rounded-lg font-bold hover:bg-gray-400">Abandonar</button>
            <button id="submitExamBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-2 rounded-lg font-bold shadow-md transition">Terminar Examen</button>
        </div>

</div>

<div id="viewAnswersModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4 overflow-auto backdrop-blur-sm">
    <div class="bg-white rounded-2xl max-w-3xl w-full max-h-[90vh] flex flex-col shadow-2xl">
        <div class="p-6 border-b flex justify-between items-center bg-blue-50 rounded-t-2xl">
            <h2 id="viewAnswersTitle" class="text-xl font-bold text-blue-900"></h2>
            <button id="closeAnswersModal" class="text-gray-500 hover:text-red-500 transition"><i class="fas fa-times text-2xl"></i></button>
        </div>
        <div id="viewAnswersContent" class="p-6 overflow-y-auto flex-1 space-y-4"></div>
        <div class="p-4 border-t flex justify-end bg-gray-50 rounded-b-2xl">
            <button id="closeAnswersModalBtn" class="bg-gray-300 hover:bg-gray-400 px-6 py-2 rounded-lg font-bold">Cerrar</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, onSnapshot, serverTimestamp, getDoc, query, where, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

    // ---------------------------------------------------------
    // 1. CONFIGURACIÓN FIREBASE
    // ---------------------------------------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyClWwYzro_avn1pK0DvD4x1r4v1grSAoE0",
        authDomain: "registro-jn-andrews-mpc.firebaseapp.com",
        projectId: "registro-jn-andrews-mpc",
        storageBucket: "registro-jn-andrews-mpc.firebasestorage.app",
        messagingSenderId: "701752375464",
        appId: "1:701752375464:web:eaab256668b869d026aa9d"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    
    const appId = "edugestor-v1";

    const studentsRef = collection(db, `artifacts/${appId}/students`);
    const tasksRef = collection(db, `artifacts/${appId}/tasks`);
    const examsRef = collection(db, `artifacts/${appId}/exams`);
    const submissionsRef = collection(db, `artifacts/${appId}/submissions`);
    const resultsRef = collection(db, `artifacts/${appId}/examResults`);

    const DEEPSEEK_API_KEY = "sk-70c41d62b6114a6d85b700e27a3c7534";
    let currentUserAuth = null, currentStudent = null, examTimerInterval = null;
    let allStudents = [], allTasks = [], allExams = [], allResults = [], allSubs = [];

    // ---------------------------------------------------------
    // 2. UTILIDADES UI
    // ---------------------------------------------------------
    function showToast(msg, type='info') {
        const container = document.getElementById('toast-container');
        if (!container) return;
        const t = document.createElement('div');
        t.className = `toast toast-${type} shadow-lg`;
        t.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':type==='error'?'fa-exclamation-circle':'fa-info-circle'} text-xl"></i><span>${msg}</span>`;
        container.appendChild(t);
        setTimeout(() => t.classList.add('show'), 10);
        setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3500);
    }

    function showConfirm(msg, onOk, title="Confirmación") {
        const m = document.getElementById('customConfirmModal');
        if (!m) return;
        document.getElementById('confirmTitle').innerText = title;
        document.getElementById('confirmMessage').innerText = msg;
        m.classList.remove('hidden'); m.classList.add('flex');
        
        const ok = document.getElementById('confirmOkBtn'), cancel = document.getElementById('confirmCancelBtn');
        const newOk = ok.cloneNode(true), newCancel = cancel.cloneNode(true);
        ok.parentNode.replaceChild(newOk, ok); cancel.parentNode.replaceChild(newCancel, cancel);
        
        newCancel.onclick = () => { m.classList.add('hidden'); m.classList.remove('flex'); };
        newOk.onclick = () => { m.classList.add('hidden'); m.classList.remove('flex'); onOk(); };
    }

    function escapeHtml(s) { return s ? s.toString().replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }
    function cleanFileName(str) { return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9.]/g, '_'); }

    // ---------------------------------------------------------
    // 3. INICIALIZACIÓN Y DATA
    // ---------------------------------------------------------
    const allGrades = ["PRIMERO DE PRIMARIA","SEGUNDO DE PRIMARIA","TERCERO DE PRIMARIA","CUARTO DE PRIMARIA","QUINTO DE PRIMARIA","SEXTO DE PRIMARIA","PRIMERO DE SECUNDARIA","SEGUNDO DE SECUNDARIA","TERCERO DE SECUNDARIA","CUARTO DE SECUNDARIA","QUINTO DE SECUNDARIA"];
    const allAreas = ["Matemáticas","Comunicación","Ciencias Sociales","Ciencia y Tecnología","Personal Social","Inglés","Arte y Cultura","Educación Física","Computación","Educación Religiosa","Tutoría","EPT"];

    function populateSelects() {
        ["taskGrade","examGrade","newStudentGrade","studentGradeSelect","filterStudentsGrade","filterTasksGrade","filterExamsGrade","filterGrade","filterSubsGrade"].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.innerHTML = '<option value="">-- Grado --</option>' + allGrades.map(g => `<option value="${g}">${g}</option>`).join('');
        });
        ["taskArea","examArea","filterTasksArea","filterExamsArea","filterArea","filterSubsArea"].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.innerHTML = '<option value="">-- Área --</option>' + allAreas.map(a => `<option value="${a}">${a}</option>`).join('');
        });
    }

    async function initAuth() {
        try {
            document.getElementById('authLoading').classList.remove('hidden');
            await signInAnonymously(auth);
        } catch(e) {
            showToast("No se pudo conectar a Firebase. Revisa tu conexión.", "error");
        } finally {
            document.getElementById('authLoading').classList.add('hidden');
        }
    }
    
    onAuthStateChanged(auth, user => { currentUserAuth = user; console.log("Auth state changed", user?.uid); });
    
    // Lista de estudiantes (completa, se omite aquí por brevedad pero se debe incluir tal cual la tenías)
    const studentsDirectory = [
        { name: "BATALLANOS SACSI, Flor de Liz", grade: "PRIMERO DE PRIMARIA", phones: ["918274035"] },
        // ... (todos los estudiantes que ya tenías)
    ];

    async function seedStudents(){ 
        if(!currentUserAuth) return; 
        const snap = await getDocs(studentsRef); 
        if(snap.empty){ 
            showToast("Sincronizando directorio escolar...", "info");
            const batch = writeBatch(db);
            studentsDirectory.forEach(s => { const newRef = doc(studentsRef); batch.set(newRef, s); });
            await batch.commit();
            showToast("Directorio de estudiantes listo.", "success"); 
        }
        // Recargar estudiantes en allStudents
        const newSnap = await getDocs(studentsRef);
        allStudents = newSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        console.log("Estudiantes cargados:", allStudents.length);
    }

    initAuth(); 
    populateSelects();

    // ---------------------------------------------------------
    // 4. FUNCIONES DOCENTE (omitidas por brevedad, están completas en tu código)
    // ---------------------------------------------------------
    // ... (aquí van las funciones callDeepSeek, generateTaskDesc, publishTask, getCurrentQuestionsFromDOM, etc. tal cual las tenías)

    // ---------------------------------------------------------
    // 5. FUNCIONES ESTUDIANTE (corregidas para cargar datos iniciales)
    // ---------------------------------------------------------
    function renderStudentTasks() { 
        const c = document.getElementById("studentTasksList"); 
        if (!c) return;
        const f = allTasks.filter(t => t.grade === currentStudent.grade);
        c.innerHTML = f.length ? f.map(t => `<div class="bg-white p-6 rounded-2xl shadow-md border-t-4 border-indigo-500 flex flex-col h-full"><div class="flex-1"><div class="font-black text-xl text-gray-800 mb-1">${escapeHtml(t.title)}</div><div class="text-[11px] font-bold text-indigo-500 uppercase mb-3">${t.area}</div><p class="text-sm text-gray-600 mb-5">${escapeHtml(t.description||'')}</p><div class="flex flex-wrap gap-2 mb-6">${t.fileURL?`<a href="${t.fileURL}" target="_blank" class="bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-indigo-100 transition"><i class="fas fa-file-download mr-1"></i> Guía Tarea</a>`:''}${t.exampleURL?`<a href="${t.exampleURL}" target="_blank" class="bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-emerald-100 transition"><i class="fas fa-file-invoice mr-1"></i> Ejemplo</a>`:''}${t.link?`<a href="${t.link}" target="_blank" class="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-100 transition"><i class="fas fa-link mr-1"></i> Enlace Web</a>`:''}</div></div><div class="pt-4 border-t border-gray-100"><label class="text-[10px] font-bold text-gray-400 block mb-2 uppercase"><i class="fas fa-upload"></i> Subir mi trabajo resuelto:</label><input type="file" id="file_${t.id}" class="text-xs w-full mb-3 file:bg-gray-100 file:border-0 file:rounded file:px-3 file:py-1"><button class="submit-task w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-bold shadow-md transition" data-tid="${t.id}" data-ttitle="${escapeHtml(t.title)}" data-tarea="${escapeHtml(t.area)}">Entregar a Profesor</button></div></div>`).join('') : '<div class="col-span-full text-center py-12 text-gray-400 font-bold"><i class="fas fa-glass-cheers text-3xl mb-3 block text-gray-300"></i> No tienes tareas asignadas.</div>';
        
        document.querySelectorAll('.submit-task').forEach(b => b.onclick = async () => { 
            const tid = b.dataset.tid, file = document.getElementById(`file_${tid}`).files[0]; 
            if(!file) return showToast("Selecciona el archivo de tu tarea primero.","error");
            const originalTxt = b.innerText; b.disabled=true; b.innerHTML='<i class="fas fa-spinner fa-spin"></i> Subiendo...';
            try {
                const safeName = cleanFileName(file.name);
                const sRef = ref(storage, `entregas/${currentStudent.id}_${tid}_${Date.now()}_${safeName}`);
                await uploadBytes(sRef, file); 
                const url = await getDownloadURL(sRef);
                await addDoc(submissionsRef, { studentId:currentStudent.id, studentName:currentStudent.name, studentGrade:currentStudent.grade, taskId:tid, taskTitle:b.dataset.ttitle, taskArea:b.dataset.tarea, fileURL:url, submittedAt:serverTimestamp(), gradeIA:"Pendiente" });
                showToast("¡Tarea entregada exitosamente!", "success");
                document.getElementById(`file_${tid}`).value = "";
                showConfirm("¿Avisar a tus padres?", () => { const p = currentStudent.phones[0]?.replace(/\s/g,''); if(p) window.open(`https://wa.me/51${p}?text=${encodeURIComponent(`✅ Acabo de entregar mi tarea de ${b.dataset.tarea}: "${b.dataset.ttitle}"`)}`,'_blank'); });
            } catch(e) { showToast("Error al entregar","error"); } finally { b.disabled=false; b.innerText=originalTxt; }
        });
    }

    function renderStudentExams() { 
        const c = document.getElementById("studentExamsList"); 
        if (!c) return;
        const f = allExams.filter(e => e.grade === currentStudent.grade);
        c.innerHTML = f.length ? f.map(e=>`<div class="bg-white p-6 rounded-2xl shadow-md border-t-4 border-purple-500 flex justify-between items-center"><div class="flex-1"><div class="font-black text-xl text-gray-800 mb-1">${escapeHtml(e.title)}</div><div class="text-xs font-bold text-purple-500 uppercase mb-2">${e.area}</div><div class="text-sm font-bold text-gray-500 bg-gray-50 inline-block px-3 py-1 rounded-lg"><i class="fas fa-clipboard-list"></i> ${e.questions.length} preguntas</div></div><button class="take-exam-btn bg-purple-600 hover:bg-purple-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition" data-exam='${JSON.stringify(e).replace(/'/g,"&apos;")}'>Resolver Examen</button></div>`).join('') : '<div class="col-span-full text-center py-12 text-gray-400 font-bold"><i class="fas fa-clipboard-check text-3xl mb-3 block text-gray-300"></i> No hay exámenes programados.</div>'; 
        document.querySelectorAll('.take-exam-btn').forEach(b=>b.onclick=()=>startExam(JSON.parse(b.dataset.exam))); 
    }

    function renderStudentGrades() { 
        const c = document.getElementById("studentGradesList"); 
        if (!c) return;
        const f = allResults.filter(r => r.studentId === currentStudent.id).sort((a,b)=>(b.date?.toMillis()||0)-(a.date?.toMillis()||0));
        c.innerHTML = f.length ? f.map(r=>{
            let col = r.grade==='AD'||r.grade==='A'?'text-emerald-500':r.grade==='B'?'text-amber-500':'text-red-500';
            return `<div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100"><div class="font-bold text-sm text-gray-600">${escapeHtml(r.examTitle)}</div><div class="text-4xl font-black ${col} my-2">${r.grade}</div><div class="text-xs font-bold text-gray-400 mb-4">${r.score}/${r.total} correctas</div><button class="wa-btn w-full bg-green-50 text-green-600 border border-green-200 py-2 rounded-lg text-sm font-bold hover:bg-green-500 hover:text-white transition" data-grade="${r.grade}" data-exam="${escapeHtml(r.examTitle)}"><i class="fab fa-whatsapp"></i> Avisar a padres</button></div>`;
        }).join('') : '<div class="col-span-full text-center py-12 text-gray-400 font-bold">Sin calificaciones aún.</div>'; 
        document.querySelectorAll('.wa-btn').forEach(b=>b.onclick=()=>{ const p=currentStudent.phones[0]?.replace(/\s/g,''); if(p) window.open(`https://wa.me/51${p}?text=${encodeURIComponent(`Mi nota en "${b.dataset.exam}" es: ${b.dataset.grade}`)}`,'_blank'); }); 
    }

    async function startExam(exam) { 
        const already = allResults.some(r => r.studentId === currentStudent.id && r.examId === exam.id);
        if(already) return showToast("Ya completaste este examen.","error"); 
        const modal = document.getElementById("examTakeModal"), content = document.getElementById("examTakeQuestions"); 
        document.getElementById("examTakeTitle").innerText = exam.title; 
        content.innerHTML = exam.questions.map((q,idx)=>`<div class="bg-gray-50 p-5 rounded-xl border border-gray-200"><p class="font-bold text-lg text-gray-800 mb-4">${idx+1}. ${escapeHtml(q.text)}</p><div class="space-y-3">${q.options.map((opt,i)=>`<label class="flex items-center p-3 rounded-lg border bg-white cursor-pointer hover:bg-indigo-50 transition"><input type="radio" name="q${idx}" value="${i}" class="w-5 h-5 text-indigo-600 mr-3"> <span class="text-sm font-semibold text-gray-700">${escapeHtml(opt)}</span></label>`).join('')}</div></div>`).join(''); 
        modal.classList.remove("hidden"); modal.classList.add("flex"); 
        let timeLeft = 30*60; const timerSpan = document.getElementById("timer"); 
        if(examTimerInterval) clearInterval(examTimerInterval); 
        examTimerInterval = setInterval(()=>{ 
            timeLeft--; timerSpan.innerText = `${Math.floor(timeLeft/60).toString().padStart(2,'0')}:${(timeLeft%60).toString().padStart(2,'0')}`; 
            if(timeLeft<=0){ clearInterval(examTimerInterval); showToast("Tiempo agotado","info"); submitExamLogic(exam,modal,content); } 
        },1000); 
        const subBtn = document.getElementById("submitExamBtn"), canBtn = document.getElementById("cancelExam"); 
        const nSub = subBtn.cloneNode(true), nCan = canBtn.cloneNode(true); 
        subBtn.parentNode.replaceChild(nSub,subBtn); canBtn.parentNode.replaceChild(nCan,canBtn); 
        nSub.onclick = () => showConfirm("¿Enviar respuestas?",()=>{ clearInterval(examTimerInterval); submitExamLogic(exam,modal,content); }); 
        nCan.onclick = () => showConfirm("¿Salir? Se perderá progreso.",()=>{ clearInterval(examTimerInterval); modal.classList.add("hidden"); modal.classList.remove("flex"); }); 
    }

    async function submitExamLogic(exam, modal, contentDiv){ 
        const answers = []; 
        exam.questions.forEach((_,idx)=>{ const sel = contentDiv.querySelector(`input[name="q${idx}"]:checked`); answers.push(sel?parseInt(sel.value):-1); }); 
        let correct=0; exam.questions.forEach((q,idx)=>{ if(answers[idx]===q.correct) correct++; }); 
        const percent = (correct/exam.questions.length)*100; 
        let grade="C"; if(percent>=90) grade="AD"; else if(percent>=75) grade="A"; else if(percent>=60) grade="B"; 
        modal.classList.add("hidden"); modal.classList.remove("flex"); 
        try{ 
            const dRef = await addDoc(resultsRef,{ studentId:currentStudent.id, studentName:currentStudent.name, studentGrade:currentStudent.grade, examId:exam.id, examTitle:exam.title, examArea:exam.area, grade, score:correct, total:exam.questions.length, date:serverTimestamp(), answers }); 
            showToast(`Nota: ${grade} (${correct}/${exam.questions.length})`,"success"); 
            showConfirm("¿Descargar reporte de tus respuestas?",()=>{ downloadPDFReport(dRef.id, currentStudent.name, exam.id); }); 
        }catch(e){ showToast("Error al guardar","error"); } 
    }

    async function downloadPDFReport(resultId, studentName, examId) {
        try {
            showToast("Generando PDF...", "info");
            let resultData = null, answers = [];
            if (resultId) { const rd = await getDoc(doc(resultsRef, resultId)); if (rd.exists()) { resultData = rd.data(); answers = resultData.answers || []; } }
            if (!resultData && currentStudent && examId) { const q = query(resultsRef, where("studentId", "==", currentStudent.id), where("examId", "==", examId)); const snap = await getDocs(q); if (!snap.empty) { resultData = snap.docs[0].data(); answers = resultData.answers || []; } }
            if (!resultData) return showToast("No se encontró el resultado","error");
            const examDoc = await getDoc(doc(examsRef, examId)); if (!examDoc.exists()) return;
            const exam = examDoc.data();
            const { jsPDF } = window.jspdf; const docP = new jsPDF();
            docP.setFontSize(22); docP.setTextColor(79,70,229); docP.text(`Reporte Oficial de Evaluación`, 20, 20);
            docP.setFontSize(12); docP.setTextColor(80,80,80); docP.text(`Examen: ${exam.title}`, 20, 32); docP.text(`Estudiante: ${studentName}`, 20, 38);
            docP.setFont("helvetica", "bold"); docP.text(`Calificación Final: ${resultData.grade} (${resultData.score}/${resultData.total})`, 20, 46); docP.setFont("helvetica", "normal");
            docP.line(20, 52, 190, 52);
            docP.setFontSize(14); docP.setTextColor(30,30,30); docP.text("Corrección y Retroalimentación:", 20, 62);
            let yPos = 72; docP.setFontSize(10);
            for (let idx = 0; idx < exam.questions.length; idx++) {
                if (yPos > 270) { docP.addPage(); yPos = 20; }
                const q = exam.questions[idx]; const ua = answers[idx] !== undefined ? answers[idx] : -1;
                const uaTxt = ua === -1 ? "N/A (En blanco)" : q.options[ua]; const caTxt = q.options[q.correct]; const isC = (ua === q.correct);
                docP.setTextColor(0,0,0); docP.setFont("helvetica", "bold"); const splitQ = docP.splitTextToSize(`${idx+1}. ${q.text}`, 170); docP.text(splitQ, 20, yPos); yPos += (splitQ.length * 5) + 2;
                docP.setFont("helvetica", "normal");
                if (isC) { docP.setTextColor(16,185,129); docP.text(`✓ Tu respuesta: ${uaTxt}`, 25, yPos); yPos += 7; } 
                else { docP.setTextColor(239,68,68); docP.text(`✗ Tu respuesta: ${uaTxt}`, 25, yPos); yPos += 5; docP.setTextColor(79,70,229); docP.text(`▶ Correcta: ${caTxt}`, 25, yPos); yPos += 7; }
                yPos += 2;
            }
            docP.save(`Reporte_${studentName}_${exam.title}.pdf`); showToast("PDF descargado", "success");
        } catch (error) { showToast("Error al generar PDF", "error"); }
    }
