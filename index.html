<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduGestor IA - Aula Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #ffffff; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 24px; right: 24px; background: #1f2937; color: white; padding: 12px 20px; border-radius: 12px; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .card-hover { transition: transform 0.2s; }
        .card-hover:hover { transform: translateY(-4px); }
        .progress-bar { height: 4px; background: #e0e0e0; border-radius: 2px; overflow: hidden; margin-top: 8px; }
        .progress-fill { width: 0%; height: 100%; background: #10b981; transition: width 0.3s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

<div id="toast" class="toast"></div>

<div id="welcomeScreen" class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-indigo-50 to-blue-50">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
        <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-brain text-3xl text-indigo-600"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">EduGestor IA</h1>
        <p class="text-gray-500 mb-6">Plataforma educativa con inteligencia artificial</p>
        <button id="teacherBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition mb-3">Acceso Docente</button>
        <button id="studentBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl transition">Acceso Estudiante</button>
    </div>
</div>

<div id="teacherModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl p-6 w-96 shadow-xl">
        <h2 class="text-xl font-bold mb-4">Acceso Docente</h2>
        <input type="password" id="teacherPass" placeholder="Contraseña" class="w-full border p-3 rounded-lg mb-4">
        <button id="loginTeacher" class="w-full bg-indigo-600 text-white py-2 rounded-lg">Ingresar</button>
        <button id="closeTeacherModal" class="w-full text-gray-500 mt-2 text-sm">Cancelar</button>
    </div>
</div>

<div id="studentModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl p-6 w-96 shadow-xl">
        <h2 class="text-xl font-bold mb-4">Selecciona tu grado</h2>
        <select id="studentGradeSelect" class="w-full border p-3 rounded-lg mb-3"></select>
        <select id="studentNameSelect" class="w-full border p-3 rounded-lg mb-4"></select>
        <button id="enterStudent" class="w-full bg-emerald-600 text-white py-2 rounded-lg">Entrar</button>
        <button id="closeStudentModal" class="w-full text-gray-500 mt-2 text-sm">Cancelar</button>
    </div>
</div>

<div id="teacherPanel" class="hidden min-h-screen bg-gray-50">
    <nav class="bg-white shadow-md border-b sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h2 class="text-xl font-bold text-indigo-600"><i class="fas fa-chalkboard-teacher mr-2"></i>Panel Docente</h2>
            <button id="logoutTeacherPanel" class="bg-red-500 text-white px-4 py-2 rounded-lg">Salir</button>
        </div>
    </nav>
    <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex flex-wrap gap-2 border-b mb-6">
            <button class="tab-btn active bg-indigo-600 text-white px-5 py-2 rounded-t-lg" data-tab="tasksTab">📝 Tareas</button>
            <button class="tab-btn bg-gray-200 text-gray-700 px-5 py-2 rounded-t-lg" data-tab="examsTab">📋 Exámenes</button>
            <button class="tab-btn bg-gray-200 text-gray-700 px-5 py-2 rounded-t-lg" data-tab="gradesTab">📊 Calificaciones</button>
            <button class="tab-btn bg-gray-200 text-gray-700 px-5 py-2 rounded-t-lg" data-tab="studentsTab">👥 Estudiantes</button>
        </div>
        <div id="tasksTab" class="tab-content">
            <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
                <h3 class="text-lg font-bold mb-4"><i class="fas fa-plus-circle text-indigo-500 mr-2"></i>Nueva Tarea</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="taskTitle" placeholder="Título (obligatorio)" class="border p-3 rounded-lg">
                    <select id="taskGrade" class="border p-3 rounded-lg"><option value="">-- Grado (opcional) --</option></select>
                    <select id="taskArea" class="border p-3 rounded-lg"><option value="">-- Área (opcional) --</option></select>
                    <div class="flex gap-2">
                        <textarea id="taskDesc" placeholder="Descripción (opcional)" class="border p-3 rounded-lg flex-1" rows="3"></textarea>
                        <button id="generateTaskDesc" class="bg-purple-600 text-white px-4 rounded-lg"><i class="fas fa-magic"></i> Generar IA</button>
                    </div>
                    <div class="md:col-span-2">
                        <input type="file" id="taskFile" accept=".pdf,.doc,.docx,.txt,.jpg,.png" class="border p-2 rounded-lg w-full">
                        <div id="uploadProgress" class="progress-bar hidden"><div class="progress-fill"></div></div>
                    </div>
                    <input type="text" id="taskLink" placeholder="Enlace (YouTube, web)" class="border p-3 rounded-lg">
                    <button id="publishTask" class="md:col-span-2 bg-indigo-600 text-white font-semibold py-3 rounded-lg">Publicar Tarea</button>
                </div>
            </div>
            <div class="flex gap-3 mb-4">
                <select id="filterTasksGrade" class="border p-2 rounded-lg"></select>
                <select id="filterTasksArea" class="border p-2 rounded-lg"></select>
            </div>
            <div id="tasksList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
        <div id="examsTab" class="tab-content hidden">
            <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
                <h3 class="text-lg font-bold mb-4"><i class="fas fa-robot text-purple-500 mr-2"></i>Crear Examen</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <input type="text" id="examTitle" placeholder="Título" class="border p-3 rounded-lg">
                    <select id="examGrade" class="border p-3 rounded-lg"></select>
                    <select id="examArea" class="border p-3 rounded-lg"></select>
                </div>
                <div class="flex flex-col md:flex-row gap-4 mb-4">
                    <textarea id="examTopic" placeholder="Describe el tema para generar preguntas" class="border p-3 rounded-lg flex-1" rows="2"></textarea>
                    <div class="bg-gray-50 p-3 rounded-lg flex items-center gap-2">
                        <label class="font-semibold">Nº preguntas:</label>
                        <input type="number" id="numQuestions" value="5" min="1" class="border p-2 rounded w-20">
                        <button id="generateQuestions" class="bg-purple-600 text-white px-4 py-2 rounded-lg"><i class="fas fa-bolt"></i> Generar IA</button>
                    </div>
                </div>
                <div id="questionsEditor" class="space-y-3 mb-4 max-h-96 overflow-auto"></div>
                <button id="publishExam" class="bg-emerald-600 text-white font-semibold py-3 rounded-lg w-full">Publicar Examen</button>
            </div>
            <div id="examsList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
        <div id="gradesTab" class="tab-content hidden">
            <div class="bg-white rounded-xl shadow-sm p-6">
                <div class="flex flex-col sm:flex-row gap-4 mb-4">
                    <select id="filterGrade" class="border p-2 rounded-lg flex-1"></select>
                    <select id="filterArea" class="border p-2 rounded-lg flex-1"></select>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse">
                        <thead><tr class="bg-gray-100 border-b"><th class="p-3">Estudiante</th><th>Examen</th><th>Nota</th><th>WhatsApp</th><th>Fecha</th></tr></thead>
                        <tbody id="gradesTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
        <div id="studentsTab" class="tab-content hidden">
            <div class="bg-white rounded-xl shadow-sm p-6">
                <h3 class="text-lg font-bold mb-4">Agregar estudiante</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
                    <input type="text" id="newStudentName" placeholder="Apellidos y nombres" class="border p-3 rounded-lg">
                    <select id="newStudentGrade" class="border p-3 rounded-lg"></select>
                    <input type="text" id="newStudentPhone" placeholder="Teléfono" class="border p-3 rounded-lg">
                    <button id="addStudent" class="md:col-span-3 bg-emerald-600 text-white py-2 rounded-lg">Guardar</button>
                </div>
                <select id="filterStudentsGrade" class="w-full border p-3 rounded-lg mb-4"></select>
                <div id="studentsList" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>
        </div>
    </div>
</div>

<div id="studentPanel" class="hidden min-h-screen bg-gray-50">
    <nav class="bg-white shadow-md border-b sticky top-0">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div><span id="studentNameSpan" class="font-bold"></span> - <span id="studentGradeSpan" class="text-sm text-gray-500"></span></div>
            <button id="logoutStudentPanel" class="bg-red-500 text-white px-4 py-2 rounded-lg">Salir</button>
        </div>
    </nav>
    <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex flex-wrap gap-2 border-b mb-6">
            <button class="student-tab-btn active bg-emerald-600 text-white px-5 py-2 rounded-t-lg" data-stab="studentTasksTab">📚 Mis Tareas</button>
            <button class="student-tab-btn bg-gray-200 text-gray-700 px-5 py-2 rounded-t-lg" data-stab="studentExamsTab">📝 Evaluaciones</button>
            <button class="student-tab-btn bg-gray-200 text-gray-700 px-5 py-2 rounded-t-lg" data-stab="studentGradesTab">⭐ Calificaciones</button>
        </div>
        <div id="studentTasksTab" class="student-tab-content"><div id="studentTasksList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div></div>
        <div id="studentExamsTab" class="student-tab-content hidden"><div id="studentExamsList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div></div>
        <div id="studentGradesTab" class="student-tab-content hidden"><div id="studentGradesList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div></div>
    </div>
</div>

<div id="examTakeModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4 overflow-auto">
    <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-auto p-6">
        <h2 id="examTakeTitle" class="text-xl font-bold mb-4"></h2>
        <div id="examTakeQuestions"></div>
        <div class="flex justify-end gap-3 mt-6">
            <button id="cancelExam" class="bg-gray-300 px-4 py-2 rounded-lg">Cancelar</button>
            <button id="submitExamBtn" class="bg-emerald-600 text-white px-6 py-2 rounded-lg">Enviar</button>
        </div>
    </div>
</div>
<div id="viewAnswersModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4 overflow-auto">
    <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-auto p-6">
        <h2 id="viewAnswersTitle" class="text-xl font-bold mb-4"></h2>
        <div id="viewAnswersContent"></div>
        <button id="closeAnswersModal" class="bg-gray-500 text-white px-4 py-2 rounded-lg mt-4">Cerrar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, onSnapshot, serverTimestamp, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyClWwYzro_avn1pK0DvD4x1r4v1grSAoE0",
        authDomain: "registro-jn-andrews-mpc.firebaseapp.com",
        projectId: "registro-jn-andrews-mpc",
        storageBucket: "registro-jn-andrews-mpc.firebasestorage.app",
        messagingSenderId: "701752375464",
        appId: "1:701752375464:web:eaab256668b869d026aa9d"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const DEEPSEEK_API_KEY = "sk-70c41d62b6114a6d85b700e27a3c7534";

    const studentsRef = collection(db, 'students');
    const tasksRef = collection(db, 'tasks');
    const examsRef = collection(db, 'exams');
    const submissionsRef = collection(db, 'submissions');
    const resultsRef = collection(db, 'examResults');

    let currentUser = null, currentStudent = null;
    let allStudents = [], allTasks = [], allExams = [], allResults = [];

    function showToast(msg, type='info') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    const allGrades = ["PRIMERO DE PRIMARIA","SEGUNDO DE PRIMARIA","TERCERO DE PRIMARIA","CUARTO DE PRIMARIA","QUINTO DE PRIMARIA","SEXTO DE PRIMARIA","PRIMERO DE SECUNDARIA","SEGUNDO DE SECUNDARIA","TERCERO DE SECUNDARIA","CUARTO DE SECUNDARIA","QUINTO DE SECUNDARIA"];
    const allAreas = ["Matemáticas","Comunicación","Ciencias Sociales","Ciencia y Tecnología","Personal Social","Inglés","Arte y Cultura","Educación Física","Computación","Educación Religiosa","Tutoría","EPT"];

    function populateSelects() {
        const selects = ['taskGrade', 'examGrade', 'newStudentGrade', 'filterStudentsGrade', 'filterGrade', 'studentGradeSelect'];
        selects.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.innerHTML = '<option value="">-- Seleccionar --</option>' + allGrades.map(g => `<option value="${g}">${g}</option>`).join('');
        });
        const areaSelects = ['taskArea', 'examArea', 'filterArea'];
        areaSelects.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.innerHTML = '<option value="">-- Seleccionar --</option>' + allAreas.map(a => `<option value="${a}">${a}</option>`).join('');
        });
        const filterGrade = document.getElementById('filterTasksGrade');
        if (filterGrade) filterGrade.innerHTML = '<option value="">-- Todos los grados --</option>' + allGrades.map(g => `<option value="${g}">${g}</option>`).join('');
        const filterArea = document.getElementById('filterTasksArea');
        if (filterArea) filterArea.innerHTML = '<option value="">-- Todas las áreas --</option>' + allAreas.map(a => `<option value="${a}">${a}</option>`).join('');
    }

    signInAnonymously(auth).catch(e => console.error(e));
    onAuthStateChanged(auth, user => { currentUser = user; if (user) seedStudents(); });

    const studentsDirectory = [ /* ... tus 407 estudiantes ... */ ];
    async function seedStudents() {
        const snap = await getDocs(studentsRef);
        if (snap.empty) {
            for (const s of studentsDirectory) {
                await addDoc(studentsRef, { name: s.name, grade: s.grade, phones: s.phones });
            }
            showToast("Directorio de estudiantes cargado", "success");
        }
    }

    function loadData() {
        onSnapshot(studentsRef, snap => { allStudents = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderStudentsList(); renderGradesTable(); });
        onSnapshot(tasksRef, snap => { allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderTasksList(); });
        onSnapshot(examsRef, snap => { allExams = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderExamsList(); });
        onSnapshot(resultsRef, snap => { allResults = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderGradesTable(); if (currentStudent) renderStudentGrades(); });
    }

    // ==================== FUNCIONES DE WHATSAPP ====================
    const PROFESOR_PHONE = "51985341634";
    const CALLMEBOT_APIKEY = "8249510";
    async function notificarProfesor(mensaje) {
        try {
            const url = `https://api.callmebot.com/whatsapp.php?phone=${PROFESOR_PHONE}&text=${encodeURIComponent(mensaje)}&apikey=${CALLMEBOT_APIKEY}`;
            await fetch(url);
            console.log("Notificación enviada al profesor");
            return true;
        } catch (error) {
            console.error("Error al enviar notificación:", error);
            return false;
        }
    }
    async function notificarProfesorConNumeroPadre(numeroPadre, estudianteNombre, evento, detalles) {
        const mensaje = `📱 NOTIFICACIÓN PADRE\n\nEstudiante: ${estudianteNombre}\nEvento: ${evento}\n${detalles}\n\n📞 Número del padre: ${numeroPadre}\n(Copia este número y pégalo en WhatsApp para contactarlo)`;
        await notificarProfesor(mensaje);
    }

    // ==================== RENDERIZADO DOCENTE ====================
    function renderTasksList() { /* ... */ }
    function renderExamsList() { /* ... */ }
    function renderStudentsList() { /* ... */ }
    async function renderGradesTable() { /* ... */ }

    // ==================== FUNCIONES DE REPORTE Y RESPUESTAS ====================
    async function downloadPDFReport(resultId, studentName, examId) { /* ... */ }
    async function viewStudentAnswers(resultId, studentName, examId) { /* ... */ }

    // ==================== FUNCIONES DE ESTUDIANTE ====================
    function renderStudentTasks() { /* ... */ }
    function renderStudentExams() { /* ... */ }
    async function startExam(exam) { /* ... */ }
    async function submitExamLogic(exam, modal, questionsDiv) { /* ... */ }
    function renderStudentGrades() { /* ... */ }

    // ==================== EVENTOS Y NAVEGACIÓN ====================
    document.getElementById('teacherBtn').onclick = () => document.getElementById('teacherModal').classList.remove('hidden');
    document.getElementById('closeTeacherModal').onclick = () => document.getElementById('teacherModal').classList.add('hidden');
    document.getElementById('loginTeacher').onclick = () => {
        if (document.getElementById('teacherPass').value === 'profemanu2026') {
            document.getElementById('teacherModal').classList.add('hidden');
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('teacherPanel').classList.remove('hidden');
            populateSelects();
            loadData();
        } else showToast("Contraseña incorrecta");
    };
    document.getElementById('logoutTeacherPanel').onclick = () => {
        document.getElementById('teacherPanel').classList.add('hidden');
        document.getElementById('welcomeScreen').classList.remove('hidden');
    };

    document.getElementById('studentBtn').onclick = async () => {
        await seedStudents();
        // --- NUEVA LÍNEA: Cargar estudiantes explícitamente ---
        const snapshot = await getDocs(studentsRef);
        allStudents = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        // --------------------------------------------------------
        populateSelects();
        document.getElementById('studentModal').classList.remove('hidden');
        const gradeSelect = document.getElementById('studentGradeSelect');
        const nameSelect = document.getElementById('studentNameSelect');
        const loadNames = async () => {
            const grade = gradeSelect.value;
            const students = allStudents.filter(s => s.grade === grade);
            nameSelect.innerHTML = '<option value="">-- Selecciona --</option>' + students.map(s => `<option value='${JSON.stringify({ id: s.id, name: s.name, grade: s.grade, phones: s.phones })}'>${escapeHtml(s.name)}</option>`).join('');
        };
        gradeSelect.onchange = loadNames;
        await loadNames();
    };

    document.getElementById('enterStudent').onclick = () => {
        const val = document.getElementById('studentNameSelect').value;
        if (!val) return showToast("Selecciona tu nombre");
        currentStudent = JSON.parse(val);
        document.getElementById('studentModal').classList.add('hidden');
        document.getElementById('welcomeScreen').classList.add('hidden');
        document.getElementById('studentPanel').classList.remove('hidden');
        document.getElementById('studentNameSpan').innerText = currentStudent.name;
        document.getElementById('studentGradeSpan').innerText = currentStudent.grade;
        // Suscribirse a cambios en tareas, exámenes y resultados
        const unsubTasks = onSnapshot(tasksRef, () => renderStudentTasks());
        const unsubExams = onSnapshot(examsRef, () => renderStudentExams());
        const unsubResults = onSnapshot(resultsRef, () => { renderStudentGrades(); renderStudentExams(); });
        renderStudentTasks(); renderStudentExams(); renderStudentGrades();
    };
    document.getElementById('closeStudentModal').onclick = () => document.getElementById('studentModal').classList.add('hidden');
    document.getElementById('logoutStudentPanel').onclick = () => {
        document.getElementById('studentPanel').classList.add('hidden');
        document.getElementById('welcomeScreen').classList.remove('hidden');
        currentStudent = null;
    };

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'bg-indigo-600', 'text-white'));
            btn.classList.add('active', 'bg-indigo-600', 'text-white');
            document.querySelectorAll('.tab-content').forEach(div => div.classList.add('hidden'));
            document.getElementById(btn.dataset.tab).classList.remove('hidden');
        };
    });
    document.querySelectorAll('.student-tab-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.student-tab-btn').forEach(b => b.classList.remove('active', 'bg-emerald-600', 'text-white'));
            btn.classList.add('active', 'bg-emerald-600', 'text-white');
            document.querySelectorAll('.student-tab-content').forEach(div => div.classList.add('hidden'));
            document.getElementById(btn.dataset.stab).classList.remove('hidden');
        };
    });

    // Publicar tarea y demás funciones (sin cambios)
    document.getElementById('publishTask').onclick = async () => { /* ... */ };
    document.getElementById('generateTaskDesc').onclick = async () => { /* ... */ };
    document.getElementById('generateQuestions').onclick = async () => { /* ... */ };
    document.getElementById('publishExam').onclick = async () => { /* ... */ };
    document.getElementById('addStudent').onclick = async () => { /* ... */ };

    // Filtros
    document.getElementById('filterTasksGrade')?.addEventListener('change', () => renderTasksList());
    document.getElementById('filterTasksArea')?.addEventListener('change', () => renderTasksList());
    document.getElementById('filterGrade')?.addEventListener('change', () => renderGradesTable());
    document.getElementById('filterArea')?.addEventListener('change', () => renderGradesTable());
    document.getElementById('filterStudentsGrade')?.addEventListener('change', () => renderStudentsList());

    document.getElementById('closeAnswersModal')?.addEventListener('click', () => {
        document.getElementById('viewAnswersModal').classList.add('hidden');
        document.getElementById('viewAnswersModal').classList.remove('flex');
    });

    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;') : ''; }
</script>
</body>
</html>
